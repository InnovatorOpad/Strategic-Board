<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>خريطة ذهنية - مساحة لا نهائية | MindMap Pro</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Amiri:wght@400;700&family=Reem+Kufi:wght@400;600&family=El+Messiri:wght@400;600&family=Almarai:wght@400;700&family=Changa:wght@400;600;700&family=Rubik:wght@400;500;700&family=Open+Sans:wght@400;600;700&family=Roboto:wght@400;500;700&family=Poppins:wght@400;600;700&family=Playfair+Display:wght@400;700&family=Monospace&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        :root {
            --bg: #1e1e2e;
            --panel-bg: #252536;
            --text: #e0e0e0;
            --accent: #7c8aff;
            --accent2: #ff7b9c;
            --border: #3a3a50;
            --hover: #2e2e42;
            --shadow: 0 12px 32px rgba(0,0,0,0.5);
            --radius: 16px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            overflow: hidden;
            height: 100vh; width: 100vw;
            user-select: none; -webkit-user-select: none;
            touch-action: none;
        }

        #welcome-screen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(20,20,30,0.9); backdrop-filter: blur(20px);
            z-index: 500; display: flex; align-items: center; justify-content: center;
            transition: opacity 0.5s, visibility 0.5s;
        }
        #welcome-screen.hidden { opacity:0; visibility:hidden; pointer-events:none; }
        .welcome-card {
            background: var(--panel-bg); border:1px solid var(--border); border-radius:32px;
            padding:40px; max-width:600px; width:90%; text-align:center; box-shadow:0 20px 50px rgba(0,0,0,0.6);
        }
        .welcome-card h1 { font-size:2.5rem; color:#fff; font-weight:900; margin-bottom:12px; }
        .welcome-card p { color:#a0a0b0; font-size:1.1rem; margin-bottom:24px; }
        .welcome-actions { display:flex; gap:16px; justify-content:center; flex-wrap:wrap; }
        .welcome-btn {
            padding:14px 28px; border-radius:50px; border:none; font-family:inherit; font-size:1rem;
            font-weight:700; cursor:pointer; display:flex; align-items:center; gap:8px;
            background: var(--accent); color:#fff; box-shadow:0 4px 12px rgba(124,138,255,0.3);
        }
        .welcome-btn.secondary { background: var(--hover); color:var(--text); border:1px solid var(--border); box-shadow:none; }
        .features-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:20px 0; text-align:right; }
        .feature-item { display:flex; align-items:center; gap:8px; color:var(--text); font-size:0.9rem; background:var(--hover); padding:10px 14px; border-radius:12px; }

        #toolbar {
            position:fixed; top:16px; left:50%; transform:translateX(-50%); z-index:100;
            display:flex; align-items:center; gap:6px; background:var(--panel-bg);
            border:1px solid var(--border); border-radius:50px; padding:6px 16px;
            box-shadow:var(--shadow); backdrop-filter:blur(20px); flex-wrap:wrap; justify-content:center;
        }
        #toolbar button {
            background:transparent; border:none; color:var(--text); cursor:pointer;
            padding:9px 14px; border-radius:25px; font-size:13px; font-family:inherit;
            transition:0.2s; white-space:nowrap; display:flex; align-items:center; gap:5px; font-weight:500;
        }
        #toolbar button:hover { background:var(--hover); color:#fff; }
        #toolbar button.highlight { background: #ff7b9c20; color: #ff7b9c; }
        .divider { width:1px; height:24px; background:var(--border); margin:0 4px; }
        .zoom-label { color:#a0a0b0; font-size:12px; padding:0 8px; min-width:45px; text-align:center; font-weight:600; }

        #canvas-container { position:fixed; top:0; left:0; width:100%; height:100%; cursor:grab; }
        canvas { display:block; position:absolute; top:0; left:0; }

        #style-panel {
            position:fixed; right:12px; top:50%; transform:translateY(-50%); z-index:99;
            background:var(--panel-bg); border:1px solid var(--border); border-radius:var(--radius);
            padding:18px; box-shadow:var(--shadow); width:270px; max-height:75vh; overflow-y:auto;
            transition:0.2s; opacity:0; pointer-events:none; backdrop-filter:blur(20px);
        }
        #style-panel.visible { opacity:1; pointer-events:all; }
        #style-panel h3 { color:var(--text); margin-bottom:12px; font-size:16px; text-align:center; }
        #style-panel .section { margin-bottom:16px; }
        #style-panel .section-label { color:#a0a0b0; font-size:11px; text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
        #style-panel .color-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
        #style-panel .color-swatch {
            width:30px; height:30px; border-radius:50%; cursor:pointer; border:2px solid transparent;
            transition:0.2s; box-shadow:0 2px 6px rgba(0,0,0,0.4);
        }
        #style-panel .color-swatch:hover { transform:scale(1.2); border-color:#fff; }
        #style-panel input[type="color"] { width:100%; height:38px; border:1px solid var(--border); border-radius:8px; background:var(--bg); padding:3px; }
        #style-panel select, #style-panel input[type="range"] {
            width:100%; padding:8px; border-radius:8px; border:1px solid var(--border);
            background:var(--bg); color:var(--text); font-family:inherit; font-size:13px;
        }
        #style-panel .btn-row { display:flex; gap:6px; }
        #style-panel .btn-row button {
            flex:1; padding:10px; border-radius:8px; border:1px solid var(--border);
            cursor:pointer; font-family:inherit; font-size:13px; background:var(--bg); color:var(--text);
        }
        #style-panel .btn-row button.danger { border-color:#f8514960; color:#f85149; }
        #style-panel .btn-row button.primary { background:var(--accent); color:#fff; border-color:var(--accent); }

        #context-menu {
            position:fixed; z-index:200; background:var(--panel-bg); border:1px solid var(--border);
            border-radius:12px; padding:6px 0; box-shadow:var(--shadow); min-width:190px;
            opacity:0; pointer-events:none; transition:opacity 0.15s;
        }
        #context-menu.visible { opacity:1; pointer-events:all; }
        #context-menu .menu-item { padding:10px 18px; cursor:pointer; color:var(--text); font-size:13px; display:flex; align-items:center; gap:8px; }
        #context-menu .menu-item:hover { background:var(--hover); }

        #node-text-input {
            position:fixed; z-index:150; border:2px solid var(--accent); border-radius:12px;
            padding:8px 14px; font-family:inherit; font-size:16px; outline:none; text-align:center;
            background:#fff; color:#1a1a2e; min-width:140px; box-shadow:0 8px 25px rgba(0,0,0,0.6);
            display:none; direction:rtl;
        }
        #toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:300; background:#2ea043; color:#fff; padding:12px 24px; border-radius:30px; font-weight:700; opacity:0; transition:0.3s; }
        #toast.show { opacity:1; }

        @media (max-width: 768px) {
            #toolbar { top:auto; bottom:12px; padding:5px 10px; }
            #toolbar button { padding:7px 9px; font-size:11px; }
            #style-panel { right:4px; width:240px; }
        }
    </style>
</head>
<body>
    <div id="welcome-screen">
        <div class="welcome-card">
            <h1>🧠 خريطة الأفكار</h1>
            <p>أوراق لاصقة 📝 · دبابيس 📌 · حفظ تلقائي فوري. اضغط على الأزرار في الشريط العلوي.</p>
            <div class="features-grid">
                <div class="feature-item"><i class="fas fa-sticky-note"></i> أوراق لاصقة</div>
                <div class="feature-item"><i class="fas fa-thumbtack"></i> دبابيس</div>
                <div class="feature-item"><i class="fas fa-palette"></i> ألوان وخطوط</div>
                <div class="feature-item"><i class="fas fa-save"></i> حفظ تلقائي</div>
            </div>
            <div class="welcome-actions">
                <button class="welcome-btn" onclick="mindMap.startNewMap()"><i class="fas fa-plus-circle"></i> ابدأ خريطة جديدة</button>
                <button class="welcome-btn secondary" onclick="mindMap.loadLastSession()"><i class="fas fa-history"></i> استئناف آخر جلسة</button>
            </div>
        </div>
    </div>

    <div id="toolbar">
        <button onclick="mindMap.addNode('node')"><i class="fas fa-circle-plus"></i> عقدة</button>
        <button onclick="mindMap.addNode('sticky')" style="background:#ffec9920;color:#ffd43b;"><i class="fas fa-sticky-note"></i> ورقة</button>
        <button onclick="mindMap.addNode('pin')" style="background:#ff6b6b20;color:#ff6b6b;"><i class="fas fa-thumbtack"></i> دبوس</button>
        <span class="divider"></span>
        <button onclick="mindMap.addChildToSelected()"><i class="fas fa-code-branch"></i> فرع</button>
        <button onclick="mindMap.addSiblingToSelected()"><i class="fas fa-arrows-left-right"></i> شقيقة</button>
        <span class="divider"></span>
        <button onclick="mindMap.undo()"><i class="fas fa-undo"></i></button>
        <button onclick="mindMap.redo()"><i class="fas fa-redo"></i></button>
        <span class="divider"></span>
        <button onclick="mindMap.autoArrange()"><i class="fas fa-magic"></i> تنسيق</button>
        <button onclick="mindMap.zoomIn()"><i class="fas fa-search-plus"></i></button>
        <span class="zoom-label" id="zoom-label">100%</span>
        <button onclick="mindMap.zoomOut()"><i class="fas fa-search-minus"></i></button>
        <button onclick="mindMap.resetView()"><i class="fas fa-home"></i></button>
        <span class="divider"></span>
        <button onclick="mindMap.exportPNG()"><i class="fas fa-download"></i> تصدير</button>
        <button onclick="mindMap.clearAll()" style="color:#f85149;"><i class="fas fa-trash-alt"></i></button>
    </div>

    <div id="canvas-container"><canvas id="main-canvas"></canvas></div>

    <div id="style-panel">
        <h3 id="style-panel-title">🎨 تخصيص</h3>
        <div class="section">
            <div class="section-label">🎯 اللون</div>
            <div class="color-grid" id="color-grid"></div>
            <input type="color" id="custom-color" value="#7c8aff" style="margin-top:8px;">
        </div>
        <div class="section">
            <div class="section-label">🔤 الخط</div>
            <select id="font-select"></select>
        </div>
        <div class="section">
            <div class="section-label">📏 حجم الخط</div>
            <input type="range" id="font-size-slider" min="10" max="48" value="18" step="1">
            <span style="color:#a0a0b0;" id="font-size-val">18px</span>
        </div>
        <div class="section btn-row">
            <button class="danger" onclick="mindMap.deleteSelected()"><i class="fas fa-trash"></i> حذف</button>
            <button class="primary" onclick="mindMap.addChildToSelected()"><i class="fas fa-plus"></i> فرع</button>
        </div>
    </div>

    <div id="context-menu">
        <div class="menu-item" data-action="addChild"><i class="fas fa-code-branch"></i> إضافة فرع</div>
        <div class="menu-item" data-action="addSibling"><i class="fas fa-arrows-left-right"></i> إضافة شقيقة</div>
        <div class="menu-item" data-action="delete" style="color:#f85149;"><i class="fas fa-trash-alt"></i> حذف</div>
    </div>

    <input type="text" id="node-text-input" dir="rtl" placeholder="أدخل النص...">
    <div id="toast"></div>

    <script>
        (function() {
            class MindMap {
                constructor() {
                    this.nodes = {}; this.rootIds = []; this.selectedNodeId = null;
                    this.offsetX = 0; this.offsetY = 0; this.zoom = 1;
                    this.isPanning = false; this.isDraggingNode = false;
                    this._mouseMoved = false;
                    this.history = []; this.historyIndex = -1;
                    this._editingNodeId = null;

                    this.canvas = document.getElementById('main-canvas');
                    this.ctx = this.canvas.getContext('2d');
                    this.container = document.getElementById('canvas-container');
                    this.stylePanel = document.getElementById('style-panel');
                    this.styleTitle = document.getElementById('style-panel-title');
                    this.contextMenu = document.getElementById('context-menu');
                    this.textInput = document.getElementById('node-text-input');
                    this.toast = document.getElementById('toast');
                    this.zoomLabel = document.getElementById('zoom-label');
                    this.welcomeScreen = document.getElementById('welcome-screen');

                    this.colorPalette = ['#7c8aff','#5C6BC0','#7E57C2','#AB47BC','#EC407A','#EF5350','#FF7043','#FFA726','#FFCA28','#FFEE58','#9CCC65','#66BB6A','#26A69A','#26C6DA','#29B6F6','#42A5F5','#78909C','#8D6E63','#F06292','#BA68C8','#64B5F6','#4DB6AC','#FFB74D','#E57373'];
                    this.availableFonts = ['Cairo','Amiri','Reem Kufi','El Messiri','Almarai','Changa','Rubik','Open Sans','Roboto','Poppins','Playfair Display','Arial','Tahoma','Trebuchet MS','Courier New','Georgia','Verdana','Impact','monospace'];

                    this.init();
                }

                init() {
                    this.resizeCanvas();
                    this.setupListeners();
                    this.buildUI();
                    this.loadLastSession(true);
                    if (Object.keys(this.nodes).length === 0) {
                        const mainId = this.createItem('node', 'الفكرة الرئيسية', 0, 0, '#7c8aff', 'rounded', 'Cairo', 20);
                        this.rootIds = [mainId];
                        this.selectedNodeId = mainId;
                        const c1 = this.createItem('node', 'الهدف ١', 200, -80, '#ff7b9c', 'rounded', 'Cairo', 16);
                        const c2 = this.createItem('node', 'الهدف ٢', 200, 80, '#66BB6A', 'rounded', 'Cairo', 16);
                        this.nodes[c1].parent = mainId; this.nodes[c2].parent = mainId;
                        this.nodes[mainId].children.push(c1, c2);
                    }
                    this.saveHistory();
                    this.render();
                    this.updateZoomLabel();
                    this.centerView();
                    this.welcomeScreen.classList.remove('hidden');
                }

                startNewMap() {
                    this.nodes = {}; this.rootIds = []; this.selectedNodeId = null;
                    this.history = []; this.historyIndex = -1;
                    this.welcomeScreen.classList.add('hidden');
                    const id = this.createItem('node', 'فكرة جديدة', 0, 0, '#7c8aff', 'rounded', 'Cairo', 20);
                    this.rootIds = [id]; this.selectedNodeId = id;
                    this.saveHistory(); this.render(); this.showStylePanel();
                    this.centerView(); this.autoSave();
                }

                loadLastSession(silent = false) {
                    const raw = localStorage.getItem('mindmap-pro-autosave');
                    if (raw) {
                        try {
                            const data = JSON.parse(raw);
                            this.nodes = data.nodes || {}; this.rootIds = data.rootIds || [];
                            this.selectedNodeId = data.selectedNodeId || null;
                            this.offsetX = data.offsetX || 0; this.offsetY = data.offsetY || 0;
                            this.zoom = data.zoom || 1;
                            this.history = []; this.historyIndex = -1; this.saveHistory();
                            this.updateZoomLabel(); this.render();
                            if (this.selectedNodeId && this.nodes[this.selectedNodeId]) this.showStylePanel();
                            if (!silent) this.showToast('📂 تم استئناف الجلسة');
                            return true;
                        } catch(e) {}
                    }
                    return false;
                }

                autoSave() {
                    try {
                        localStorage.setItem('mindmap-pro-autosave', JSON.stringify({
                            nodes: this.nodes, rootIds: this.rootIds,
                            selectedNodeId: this.selectedNodeId,
                            offsetX: this.offsetX, offsetY: this.offsetY, zoom: this.zoom
                        }));
                    } catch(e) {}
                }

                resizeCanvas() {
                    const dpr = window.devicePixelRatio || 1;
                    const w = window.innerWidth, h = window.innerHeight;
                    this.canvas.width = w * dpr; this.canvas.height = h * dpr;
                    this.canvas.style.width = w + 'px'; this.canvas.style.height = h + 'px';
                    this.ctx.setTransform(1,0,0,1,0,0); this.ctx.scale(dpr, dpr);
                    this.canvasDisplayW = w; this.canvasDisplayH = h;
                }

                setupListeners() {
                    window.addEventListener('resize', () => { this.resizeCanvas(); this.render(); });
                    this.canvas.addEventListener('mousedown', e => this.onMouseDown(e));
                    window.addEventListener('mousemove', e => this.onMouseMove(e));
                    window.addEventListener('mouseup', e => this.onMouseUp(e));
                    this.canvas.addEventListener('wheel', e => this.onWheel(e), { passive: false });
                    this.canvas.addEventListener('dblclick', e => this.onDoubleClick(e));
                    this.canvas.addEventListener('contextmenu', e => this.onContextMenu(e));
                    this.canvas.addEventListener('touchstart', e => this.onTouchStart(e), { passive: false });
                    this.canvas.addEventListener('touchmove', e => this.onTouchMove(e), { passive: false });
                    this.canvas.addEventListener('touchend', e => this.onTouchEnd(e));
                    window.addEventListener('keydown', e => this.onKeyDown(e));

                    document.getElementById('custom-color').addEventListener('input', e => this.applyStyle('color', e.target.value));
                    document.getElementById('custom-color').addEventListener('change', () => { this.saveHistory(); this.autoSave(); });
                    document.getElementById('font-select').addEventListener('change', e => { this.applyStyle('fontFamily', e.target.value); this.autoSave(); });
                    document.getElementById('font-size-slider').addEventListener('input', e => {
                        document.getElementById('font-size-val').textContent = e.target.value + 'px';
                        this.applyStyle('fontSize', parseInt(e.target.value));
                    });
                    document.getElementById('font-size-slider').addEventListener('change', () => { this.saveHistory(); this.autoSave(); });
                    this.setupTextInput();
                    this.setupContextMenu();
                }

                buildUI() {
                    const grid = document.getElementById('color-grid');
                    grid.innerHTML = '';
                    this.colorPalette.forEach(c => {
                        const s = document.createElement('div'); s.className='color-swatch'; s.style.backgroundColor=c;
                        s.addEventListener('click', () => this.applyStyle('color', c));
                        grid.appendChild(s);
                    });
                    const fontSel = document.getElementById('font-select');
                    fontSel.innerHTML = '';
                    this.availableFonts.forEach(f => { const o = document.createElement('option'); o.value=f; o.textContent=f; fontSel.appendChild(o); });
                }

                createItem(type, text, x, y, color, shape, fontFamily, fontSize) {
                    const id = type + '_' + Date.now() + '_' + Math.random().toString(36).substr(2,6);
                    const base = {
                        id, type, text: text || (type==='pin'?'📍':(type==='sticky'?'ملاحظة':'عقدة')), x, y,
                        color: color || (type==='sticky'?'#ffec99':(type==='pin'?'#ff6b6b':'#7c8aff')),
                        width: type==='pin'?24:140, height: type==='pin'?24:50,
                        fontSize: fontSize || (type==='pin'?12:18), fontFamily: fontFamily || 'Cairo',
                        shape: shape || 'rounded', borderWidth: 2, shadow: true,
                        children: [], parent: null, collapsed: false,
                    };
                    if (type === 'pin') { base.shape = 'circle'; base.width = 24; base.height = 24; }
                    if (type === 'sticky') { base.shape = 'rect'; base.width = 160; base.height = 120; base.color = color || '#ffec99'; base.textColor = '#333'; }
                    base.textColor = base.textColor || this.getContrastColor(base.color);
                    base.borderColor = this.darkenColor(base.color, 0.3);
                    this.nodes[id] = base;
                    return id;
                }

                addNode(type) {
                    // يظهر العنصر الجديد في منتصف الشاشة تماماً
                    const centerWorld = this.screenToWorld(this.canvasDisplayW/2, this.canvasDisplayH/2);
                    const color = type==='sticky'?'#ffec99':(type==='pin'?'#ff6b6b':this.colorPalette[Math.floor(Math.random()*this.colorPalette.length)]);
                    const id = this.createItem(type, type==='pin'?'📍':(type==='sticky'?'ملاحظة':'عقدة'), centerWorld.x, centerWorld.y, color);
                    if (type === 'node') this.rootIds.push(id);
                    this.selectedNodeId = id;
                    this.saveHistory(); this.render(); this.showStylePanel();
                    this.welcomeScreen.classList.add('hidden');
                    this.autoSave();
                    this.showToast(type==='sticky'?'📝 ورقة لاصقة جديدة':(type==='pin'?'📌 دبوس جديد':'🟢 عقدة جديدة'));
                }

                addChildToSelected() {
                    if (!this.selectedNodeId || !this.nodes[this.selectedNodeId]) return;
                    const parent = this.nodes[this.selectedNodeId];
                    if (parent.type !== 'node') { this.showToast('⚠️ الفروع متاحة للعقد فقط'); return; }
                    const angle = (parent.children.length * 0.7) + (Math.random()-0.5)*0.4;
                    const dist = 180 + Math.random()*60;
                    const childId = this.createItem('node', 'فرع', parent.x + Math.cos(angle)*dist, parent.y + Math.sin(angle)*dist, this.colorPalette[Math.floor(Math.random()*this.colorPalette.length)]);
                    this.nodes[childId].parent = this.selectedNodeId;
                    parent.children.push(childId);
                    this.selectedNodeId = childId;
                    this.saveHistory(); this.render(); this.showStylePanel();
                    this.autoSave();
                }

                addSiblingToSelected() {
                    if (!this.selectedNodeId) return;
                    const node = this.nodes[this.selectedNodeId];
                    if (node.type !== 'node') { this.showToast('⚠️ الأشقاء للعقد فقط'); return; }
                    if (!node.parent || !this.nodes[node.parent]) {
                        const id = this.createItem('node', 'شقيقة', node.x+200, node.y+100, this.colorPalette[Math.floor(Math.random()*this.colorPalette.length)]);
                        this.rootIds.push(id); this.selectedNodeId = id;
                    } else {
                        const parent = this.nodes[node.parent];
                        const angle = Math.atan2(node.y-parent.y, node.x-parent.x)+0.7;
                        const dist = Math.hypot(node.x-parent.x, node.y-parent.y);
                        const id = this.createItem('node', 'شقيقة', parent.x+Math.cos(angle)*dist, parent.y+Math.sin(angle)*dist, node.color);
                        this.nodes[id].parent = node.parent; parent.children.push(id); this.selectedNodeId = id;
                    }
                    this.saveHistory(); this.render(); this.showStylePanel();
                    this.autoSave();
                }

                deleteSelected() {
                    if (!this.selectedNodeId) return;
                    this.deleteNode(this.selectedNodeId);
                    this.selectedNodeId = null;
                    this.hideStylePanel(); this.saveHistory(); this.render(); this.autoSave();
                }

                deleteNode(id) {
                    const node = this.nodes[id]; if (!node) return;
                    if (node.children) [...node.children].forEach(c => this.deleteNode(c));
                    if (node.parent && this.nodes[node.parent]) {
                        this.nodes[node.parent].children = this.nodes[node.parent].children.filter(c => c !== id);
                    }
                    this.rootIds = this.rootIds.filter(r => r !== id);
                    delete this.nodes[id];
                }

                clearAll() {
                    if (confirm('مسح الجميع؟')) {
                        this.nodes = {}; this.rootIds = []; this.selectedNodeId = null;
                        this.history = []; this.historyIndex = -1; this.hideStylePanel();
                        this.saveHistory(); this.render(); this.autoSave();
                    }
                }

                saveHistory() {
                    const snap = { nodes: JSON.parse(JSON.stringify(this.nodes)), rootIds: [...this.rootIds], selectedNodeId: this.selectedNodeId };
                    if (this.historyIndex < this.history.length-1) this.history = this.history.slice(0, this.historyIndex+1);
                    this.history.push(snap);
                    if (this.history.length > 80) this.history.shift();
                    else this.historyIndex = this.history.length-1;
                }

                undo() { if (this.historyIndex<=0) return; this.historyIndex--; this.restoreSnapshot(this.history[this.historyIndex]); this.render(); this.autoSave(); }
                redo() { if (this.historyIndex>=this.history.length-1) return; this.historyIndex++; this.restoreSnapshot(this.history[this.historyIndex]); this.render(); this.autoSave(); }
                restoreSnapshot(s) { this.nodes = JSON.parse(JSON.stringify(s.nodes)); this.rootIds = [...s.rootIds]; this.selectedNodeId = s.selectedNodeId; }

                autoArrange() {
                    if (this.rootIds.length === 0) return;
                    const visited = new Set();
                    const arrange = (id, angle, spread, radius) => {
                        const node = this.nodes[id];
                        if (!node || node.type !== 'node' || !node.children.length) return;
                        node.children.forEach((cid, i) => {
                            const child = this.nodes[cid]; if (!child) return;
                            const a = angle - spread/2 + (spread/(node.children.length-1 || 1))*i;
                            child.x = node.x + Math.cos(a)*radius; child.y = node.y + Math.sin(a)*radius;
                            visited.add(cid); arrange(cid, a, spread*0.7, radius*0.75);
                        });
                    };
                    if (this.rootIds.length === 1) {
                        this.nodes[this.rootIds[0]].x = 0; this.nodes[this.rootIds[0]].y = 0;
                        visited.add(this.rootIds[0]); arrange(this.rootIds[0], -Math.PI/2, Math.PI*1.8, 200);
                    } else {
                        this.rootIds.forEach((rid, i) => {
                            const node = this.nodes[rid];
                            if (node) { const a = (2*Math.PI/this.rootIds.length)*i; node.x = Math.cos(a)*250; node.y = Math.sin(a)*250; visited.add(rid); arrange(rid, a, Math.PI*0.6, 160); }
                        });
                    }
                    this.saveHistory(); this.render(); this.centerView(); this.autoSave();
                }

                centerView() {
                    const all = Object.values(this.nodes);
                    if (all.length === 0) { this.offsetX = this.canvasDisplayW/2; this.offsetY = this.canvasDisplayH/2; this.zoom = 1; }
                    else {
                        let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
                        all.forEach(n => { minX=Math.min(minX,n.x-n.width/2); minY=Math.min(minY,n.y-n.height/2); maxX=Math.max(maxX,n.x+n.width/2); maxY=Math.max(maxY,n.y+n.height/2); });
                        const w = maxX-minX+200, h = maxY-minY+200;
                        this.zoom = Math.max(0.2, Math.min(2, Math.min(this.canvasDisplayW/w, this.canvasDisplayH/h)));
                        this.offsetX = this.canvasDisplayW/2 - (minX+maxX)/2*this.zoom;
                        this.offsetY = this.canvasDisplayH/2 - (minY+maxY)/2*this.zoom;
                    }
                    this.updateZoomLabel(); this.render();
                }

                resetView() { this.centerView(); }
                zoomIn() { this.zoom = Math.min(5, this.zoom*1.25); this.updateZoomLabel(); this.render(); this.autoSave(); }
                zoomOut() { this.zoom = Math.max(0.1, this.zoom/1.25); this.updateZoomLabel(); this.render(); this.autoSave(); }
                updateZoomLabel() { this.zoomLabel.textContent = Math.round(this.zoom*100)+'%'; }

                screenToWorld(sx, sy) { return { x: (sx-this.offsetX)/this.zoom, y: (sy-this.offsetY)/this.zoom }; }
                worldToScreen(wx, wy) { return { x: wx*this.zoom+this.offsetX, y: wy*this.zoom+this.offsetY }; }

                onMouseDown(e) {
                    if (e.button === 1 || (e.button===0 && e.altKey)) { this.isPanning=true; this.panStart={x:e.clientX,y:e.clientY}; return; }
                    this._mouseMoved = false;
                    const hit = this.hitTest(this.screenToWorld(e.clientX,e.clientY).x, this.screenToWorld(e.clientX,e.clientY).y);
                    if (hit) {
                        this.selectedNodeId = hit.id; this.isDraggingNode = true;
                        this.nodeDragStartPos = {x:hit.x, y:hit.y}; this.dragStart = {x:e.clientX, y:e.clientY};
                        this.showStylePanel(); this.welcomeScreen.classList.add('hidden');
                    } else {
                        this.isPanning = true; this.panStart = {x:e.clientX, y:e.clientY};
                        this.selectedNodeId = null; this.hideStylePanel();
                    }
                    this.render();
                }

                onMouseMove(e) {
                    if (this.isDraggingNode && this.selectedNodeId && this.nodes[this.selectedNodeId]) {
                        const dx = e.clientX-this.dragStart.x, dy = e.clientY-this.dragStart.y;
                        if (Math.abs(dx)>2 || Math.abs(dy)>2) this._mouseMoved = true;
                        this.nodes[this.selectedNodeId].x = this.nodeDragStartPos.x + dx/this.zoom;
                        this.nodes[this.selectedNodeId].y = this.nodeDragStartPos.y + dy/this.zoom;
                        this.render(); return;
                    }
                    if (this.isPanning) {
                        this.offsetX += e.clientX-this.panStart.x; this.offsetY += e.clientY-this.panStart.y;
                        this.panStart = {x:e.clientX, y:e.clientY}; this.render(); return;
                    }
                    const hit = this.hitTest(this.screenToWorld(e.clientX,e.clientY).x, this.screenToWorld(e.clientX,e.clientY).y);
                    this.hoveredNodeId = hit ? hit.id : null;
                }

                onMouseUp(e) {
                    if (this.isDraggingNode) {
                        if (!this._mouseMoved && this.selectedNodeId && this.nodes[this.selectedNodeId]) {
                            this.startTextEdit(this.nodes[this.selectedNodeId]);
                        } else { this.saveHistory(); this.autoSave(); }
                        this.isDraggingNode = false;
                    }
                    if (this.isPanning) { this.isPanning = false; this.autoSave(); }
                }

                onWheel(e) {
                    e.preventDefault();
                    const before = this.screenToWorld(e.clientX, e.clientY);
                    this.zoom = Math.max(0.1, Math.min(5, this.zoom * (e.deltaY<0?1.08:1/1.08)));
                    const after = this.screenToWorld(e.clientX, e.clientY);
                    this.offsetX += (after.x-before.x)*this.zoom; this.offsetY += (after.y-before.y)*this.zoom;
                    this.updateZoomLabel(); this.render(); this.autoSave();
                }

                onDoubleClick(e) {
                    const world = this.screenToWorld(e.clientX, e.clientY);
                    const hit = this.hitTest(world.x, world.y);
                    if (hit) { this.selectedNodeId = hit.id; this.showStylePanel(); this.startTextEdit(hit); }
                    else {
                        const id = this.createItem('node', 'عقدة جديدة', world.x, world.y, this.colorPalette[Math.floor(Math.random()*this.colorPalette.length)]);
                        this.rootIds.push(id); this.selectedNodeId = id;
                        this.saveHistory(); this.render(); this.showStylePanel(); this.startTextEdit(this.nodes[id]);
                    }
                    this.welcomeScreen.classList.add('hidden'); this.autoSave();
                }

                onContextMenu(e) {
                    e.preventDefault();
                    const hit = this.hitTest(this.screenToWorld(e.clientX,e.clientY).x, this.screenToWorld(e.clientX,e.clientY).y);
                    if (hit) {
                        this.selectedNodeId = hit.id; this.showStylePanel();
                        this.contextMenu.style.left = Math.min(e.clientX, window.innerWidth-200)+'px';
                        this.contextMenu.style.top = Math.min(e.clientY, window.innerHeight-200)+'px';
                        this.contextMenu.classList.add('visible');
                    }
                }

                onTouchStart(e) {
                    if (e.touches.length === 1) {
                        this._mouseMoved = false;
                        const t = e.touches[0]; const world = this.screenToWorld(t.clientX, t.clientY);
                        const hit = this.hitTest(world.x, world.y);
                        if (hit) {
                            this.selectedNodeId = hit.id; this.isDraggingNode = true;
                            this.nodeDragStartPos = {x:hit.x, y:hit.y}; this.dragStart = {x:t.clientX, y:t.clientY};
                            this.showStylePanel(); this.welcomeScreen.classList.add('hidden');
                        } else { this.isPanning = true; this.panStart = {x:t.clientX, y:t.clientY}; }
                        this.render();
                    }
                }
                onTouchMove(e) {
                    e.preventDefault();
                    if (this.isDraggingNode && e.touches.length===1) {
                        const t = e.touches[0]; const dx = t.clientX-this.dragStart.x, dy = t.clientY-this.dragStart.y;
                        if (Math.abs(dx)>3 || Math.abs(dy)>3) this._mouseMoved = true;
                        if (this.nodes[this.selectedNodeId]) {
                            this.nodes[this.selectedNodeId].x = this.nodeDragStartPos.x + dx/this.zoom;
                            this.nodes[this.selectedNodeId].y = this.nodeDragStartPos.y + dy/this.zoom;
                        }
                        this.render();
                    } else if (this.isPanning && e.touches.length===1) {
                        const t = e.touches[0];
                        this.offsetX += t.clientX-this.panStart.x; this.offsetY += t.clientY-this.panStart.y;
                        this.panStart = {x:t.clientX, y:t.clientY}; this.render();
                    }
                }
                onTouchEnd() {
                    if (this.isDraggingNode) {
                        if (!this._mouseMoved && this.selectedNodeId && this.nodes[this.selectedNodeId]) this.startTextEdit(this.nodes[this.selectedNodeId]);
                        else { this.saveHistory(); this.autoSave(); }
                        this.isDraggingNode = false;
                    }
                    if (this.isPanning) { this.isPanning = false; this.autoSave(); }
                }

                onKeyDown(e) {
                    if (e.target === this.textInput) { if (e.key==='Escape') this.finishTextEdit(); return; }
                    if (e.key==='Delete'||e.key==='Backspace') { this.deleteSelected(); e.preventDefault(); }
                    else if (e.key==='Tab') { this.addChildToSelected(); e.preventDefault(); }
                    else if (e.key==='Enter') { this.addSiblingToSelected(); e.preventDefault(); }
                    else if ((e.ctrlKey||e.metaKey)&&e.key==='z') { e.shiftKey?this.redo():this.undo(); e.preventDefault(); }
                }

                hitTest(wx, wy) {
                    const items = Object.values(this.nodes);
                    for (let i=items.length-1; i>=0; i--) {
                        if (this.isPointInItem(wx, wy, items[i])) return items[i];
                    }
                    return null;
                }

                isPointInItem(wx, wy, item) {
                    const hw = item.width/2, hh = item.height/2;
                    if (item.type === 'pin') return Math.hypot(wx-item.x, wy-item.y) <= 14;
                    if (item.shape === 'circle') return ((wx-item.x)**2)/(hw**2)+((wy-item.y)**2)/(hh**2) <= 1;
                    if (item.shape === 'diamond') return Math.abs(wx-item.x)/hw + Math.abs(wy-item.y)/hh <= 1;
                    return wx >= item.x-hw && wx <= item.x+hw && wy >= item.y-hh && wy <= item.y+hh;
                }

                startTextEdit(item) {
                    const screen = this.worldToScreen(item.x, item.y);
                    this.textInput.style.display = 'block';
                    this.textInput.value = item.text;
                    this.textInput.style.fontFamily = item.fontFamily + ', sans-serif';
                    this.textInput.style.fontSize = (item.fontSize * this.zoom) + 'px';
                    this.textInput.style.left = (screen.x - item.width*this.zoom/2) + 'px';
                    this.textInput.style.top = (screen.y - item.height*this.zoom/2 - 5) + 'px';
                    this.textInput.style.minWidth = (item.width*this.zoom) + 'px';
                    this.textInput.focus(); this.textInput.select();
                    this._editingNodeId = item.id;
                }

                finishTextEdit() {
                    if (this._editingNodeId && this.nodes[this._editingNodeId]) {
                        const item = this.nodes[this._editingNodeId];
                        const newText = this.textInput.value.trim() || item.text;
                        if (newText !== item.text) {
                            item.text = newText;
                            if (item.type !== 'pin') item.width = Math.max(80, Math.min(300, newText.length * item.fontSize * 0.6 + 40));
                            this.saveHistory(); this.autoSave();
                        }
                    }
                    this.textInput.style.display = 'none';
                    this._editingNodeId = null;
                    this.render();
                }

                setupTextInput() {
                    this.textInput.addEventListener('blur', () => setTimeout(() => this.finishTextEdit(), 150));
                    this.textInput.addEventListener('keydown', e => {
                        if (e.key === 'Enter') { e.preventDefault(); this.finishTextEdit(); }
                        if (e.key === 'Escape') this.finishTextEdit();
                    });
                }

                setupContextMenu() {
                    document.querySelectorAll('#context-menu .menu-item').forEach(item => {
                        item.addEventListener('click', () => {
                            const action = item.dataset.action;
                            if (action==='addChild') this.addChildToSelected();
                            else if (action==='addSibling') this.addSiblingToSelected();
                            else if (action==='delete') this.deleteSelected();
                            this.contextMenu.classList.remove('visible');
                        });
                    });
                }

                applyStyle(prop, value) {
                    if (!this.selectedNodeId || !this.nodes[this.selectedNodeId]) return;
                    const item = this.nodes[this.selectedNodeId];
                    item[prop] = value;
                    if (prop === 'color') { item.textColor = this.getContrastColor(value); item.borderColor = this.darkenColor(value, 0.3); }
                    if (prop === 'fontSize' && item.type !== 'pin') item.width = Math.max(80, Math.min(300, item.text.length * value * 0.6 + 40));
                    this.render(); this.autoSave();
                }

                showStylePanel() {
                    if (!this.selectedNodeId) return;
                    const item = this.nodes[this.selectedNodeId];
                    this.stylePanel.classList.add('visible');
                    this.styleTitle.textContent = item.type==='pin'?'📍 دبوس':(item.type==='sticky'?'📝 ورقة لاصقة':'🧠 عقدة');
                    document.getElementById('custom-color').value = item.color;
                    document.getElementById('font-select').value = item.fontFamily;
                    document.getElementById('font-size-slider').value = item.fontSize;
                    document.getElementById('font-size-val').textContent = item.fontSize+'px';
                }
                hideStylePanel() { this.stylePanel.classList.remove('visible'); }

                render() {
                    const ctx = this.ctx;
                    ctx.clearRect(0,0,this.canvasDisplayW,this.canvasDisplayH);
                    ctx.fillStyle = '#1e1e2e'; ctx.fillRect(0,0,this.canvasDisplayW,this.canvasDisplayH);
                    ctx.fillStyle = '#2a2a3c';
                    const spacing = 40;
                    const tl = this.screenToWorld(0,0), br = this.screenToWorld(this.canvasDisplayW,this.canvasDisplayH);
                    for (let wx = Math.floor(tl.x/spacing)*spacing; wx<=br.x; wx+=spacing)
                        for (let wy = Math.floor(tl.y/spacing)*spacing; wy<=br.y; wy+=spacing) {
                            const s = this.worldToScreen(wx,wy);
                            ctx.beginPath(); ctx.arc(s.x,s.y,1.2,0,Math.PI*2); ctx.fill();
                        }
                    ctx.save(); ctx.translate(this.offsetX, this.offsetY); ctx.scale(this.zoom, this.zoom);
                    Object.values(this.nodes).forEach(item => {
                        if (item.type === 'node' && item.children) item.children.forEach(cid => {
                            const child = this.nodes[cid];
                            if (child && child.type === 'node') this.drawConnection(item, child);
                        });
                    });
                    Object.values(this.nodes).forEach(item => this.drawItem(item));
                    ctx.restore();
                }

                drawConnection(parent, child) {
                    const ctx = this.ctx;
                    const p = this.getEdgePoint(parent, child.x, child.y);
                    const c = this.getEdgePoint(child, parent.x, parent.y);
                    ctx.beginPath(); ctx.moveTo(p.x, p.y);
                    const dist = Math.hypot(c.x-p.x, c.y-p.y), cp = Math.min(dist*0.4, 150);
                    const a1 = Math.atan2(c.y-p.y, c.x-p.x), a2 = Math.atan2(p.y-c.y, p.x-c.x);
                    ctx.bezierCurveTo(p.x+Math.cos(a1)*cp, p.y+Math.sin(a1)*cp, c.x+Math.cos(a2)*cp, c.y+Math.sin(a2)*cp, c.x, c.y);
                    ctx.strokeStyle = parent.color; ctx.lineWidth = Math.max(2, 3/this.zoom); ctx.globalAlpha=0.7; ctx.stroke(); ctx.globalAlpha=1;
                }

                getEdgePoint(item, tx, ty) {
                    const angle = Math.atan2(ty-item.y, tx-item.x), hw=item.width/2, hh=item.height/2;
                    if (item.shape === 'circle') {
                        const r = (hw*hh)/Math.sqrt((hh*Math.cos(angle))**2 + (hw*Math.sin(angle))**2);
                        return {x:item.x+Math.cos(angle)*r, y:item.y+Math.sin(angle)*r};
                    }
                    const ax = Math.abs(Math.cos(angle)), ay = Math.abs(Math.sin(angle));
                    const t = Math.min(ax>0.001?hw/ax:Infinity, ay>0.001?hh/ay:Infinity);
                    return {x:item.x+Math.cos(angle)*Math.min(t,Math.hypot(hw,hh)), y:item.y+Math.sin(angle)*Math.min(t,Math.hypot(hw,hh))};
                }

                drawItem(item) {
                    const ctx = this.ctx;
                    if (item.type === 'pin') {
                        ctx.save();
                        ctx.shadowColor = 'rgba(0,0,0,0.4)'; ctx.shadowBlur = 10/this.zoom;
                        ctx.fillStyle = item.color;
                        ctx.beginPath(); ctx.arc(item.x, item.y, 13/this.zoom, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = '#fff';
                        ctx.font = `bold ${11/this.zoom}px Cairo`; ctx.textAlign='center'; ctx.textBaseline='middle';
                        ctx.fillText('📌', item.x, item.y);
                        ctx.restore();
                        return;
                    }
                    if (item.type === 'sticky') {
                        ctx.save();
                        ctx.shadowColor = 'rgba(0,0,0,0.35)'; ctx.shadowBlur = 12/this.zoom;
                        ctx.fillStyle = item.color;
                        const hw=item.width/2, hh=item.height/2;
                        ctx.beginPath(); ctx.rect(item.x-hw, item.y-hh, item.width, item.height); ctx.fill();
                        ctx.shadowColor = 'transparent';
                        ctx.strokeStyle = '#d4c685'; ctx.lineWidth = 2/this.zoom; ctx.stroke();
                        ctx.fillStyle = item.textColor || '#333';
                        const fs = item.fontSize/this.zoom;
                        ctx.font = `${fs}px "${item.fontFamily}", Cairo`; ctx.textAlign='center'; ctx.textBaseline='middle';
                        this.wrapText(ctx, item.text, item.x, item.y, item.width-10/this.zoom, fs*1.5);
                        ctx.restore();
                        return;
                    }
                    const sel = item.id === this.selectedNodeId;
                    ctx.save();
                    if (item.shadow) { ctx.shadowColor='rgba(0,0,0,0.35)'; ctx.shadowBlur=12/this.zoom; }
                    ctx.fillStyle = item.color;
                    this.drawShape(ctx, item.x, item.y, item.width, item.height, item.shape, true);
                    ctx.shadowColor='transparent';
                    ctx.strokeStyle = sel ? '#fff' : item.borderColor;
                    ctx.lineWidth = (sel?3.5:item.borderWidth)/this.zoom;
                    this.drawShape(ctx, item.x, item.y, item.width, item.height, item.shape, false);
                    ctx.restore();
                    ctx.save();
                    ctx.fillStyle = item.textColor;
                    ctx.font = `600 ${item.fontSize/this.zoom}px "${item.fontFamily}", Cairo`;
                    ctx.textAlign='center'; ctx.textBaseline='middle';
                    ctx.fillText(item.text, item.x, item.y);
                    ctx.restore();
                }

                drawShape(ctx, x, y, w, h, shape, fill) {
                    const hw=w/2, hh=h/2; ctx.beginPath();
                    switch(shape) {
                        case 'circle': ctx.ellipse(x,y,hw,hh,0,0,Math.PI*2); break;
                        case 'diamond': ctx.moveTo(x,y-hh); ctx.lineTo(x+hw,y); ctx.lineTo(x,y+hh); ctx.lineTo(x-hw,y); ctx.closePath(); break;
                        case 'rounded': const cr=Math.min(hw,hh,12); ctx.moveTo(x-hw+cr,y-hh); ctx.lineTo(x+hw-cr,y-hh); ctx.arcTo(x+hw,y-hh,x+hw,y-hh+cr,cr); ctx.lineTo(x+hw,y+hh-cr); ctx.arcTo(x+hw,y+hh,x+hw-cr,y+hh,cr); ctx.lineTo(x-hw+cr,y+hh); ctx.arcTo(x-hw,y+hh,x-hw,y+hh-cr,cr); ctx.lineTo(x-hw,y-hh+cr); ctx.arcTo(x-hw,y-hh,x-hw+cr,y-hh,cr); ctx.closePath(); break;
                        default: ctx.rect(x-hw,y-hh,w,h); break;
                    }
                    if (fill) ctx.fill(); else ctx.stroke();
                }

                wrapText(ctx, text, x, y, maxWidth, lineHeight) {
                    const words = text.split(' '); let line = ''; const lines = [];
                    for (let n=0; n<words.length; n++) {
                        const testLine = line + words[n] + ' ';
                        if (ctx.measureText(testLine).width > maxWidth && n>0) { lines.push(line.trim()); line = words[n] + ' '; }
                        else line = testLine;
                    }
                    lines.push(line.trim());
                    const startY = y - ((lines.length-1)*lineHeight)/2;
                    lines.forEach((l, i) => ctx.fillText(l, x, startY + i*lineHeight));
                }

                getContrastColor(hex) {
                    const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
                    return (r*299+g*587+b*114)/1000 > 140 ? '#1a1a2e' : '#fff';
                }
                darkenColor(hex, a) {
                    let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
                    return '#'+[r,g,b].map(c=>Math.max(0,Math.floor(c*(1-a))).toString(16).padStart(2,'0')).join('');
                }

                showToast(msg) {
                    if (this._toastTimeout) clearTimeout(this._toastTimeout);
                    this.toast.textContent = msg; this.toast.classList.add('show');
                    this._toastTimeout = setTimeout(() => this.toast.classList.remove('show'), 2000);
                }

                exportPNG() {
                    const all = Object.values(this.nodes);
                    if (!all.length) return;
                    let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
                    all.forEach(n => { minX=Math.min(minX,n.x-n.width); minY=Math.min(minY,n.y-n.height); maxX=Math.max(maxX,n.x+n.width); maxY=Math.max(maxY,n.y+n.height); });
                    const pad=80, w=maxX-minX+pad*2, h=maxY-minY+pad*2, z=Math.min(4000/w,4000/h,3);
                    const tmp=document.createElement('canvas'); tmp.width=w*z; tmp.height=h*z;
                    const tctx=tmp.getContext('2d'); tctx.fillStyle='#1e1e2e'; tctx.fillRect(0,0,tmp.width,tmp.height);
                    const so=this.offsetX, sy=this.offsetY, sz=this.zoom, sw=this.canvasDisplayW, sh=this.canvasDisplayH;
                    this.offsetX = -minX*z+pad*z; this.offsetY = -minY*z+pad*z; this.zoom=z; this.canvasDisplayW=tmp.width; this.canvasDisplayH=tmp.height; this.ctx=tctx;
                    this.render();
                    this.offsetX=so; this.offsetY=sy; this.zoom=sz; this.canvasDisplayW=sw; this.canvasDisplayH=sh; this.ctx=this.canvas.getContext('2d'); this.render();
                    const a=document.createElement('a'); a.download='mindmap-'+new Date().toISOString().slice(0,10)+'.png'; a.href=tmp.toDataURL(); a.click();
                }
            }

            const mindMap = new MindMap();
            window.mindMap = mindMap;
            document.getElementById('welcome-screen').addEventListener('click', function(e) { if (e.target === this) this.classList.add('hidden'); });
        })();
    </script>
</body>
