<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة ذهنية - مساحة لا نهائية</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Amiri:wght@400;700&family=Reem+Kufi:wght@400;600&family=El+Messiri:wght@400;600&family=Almarai:wght@400;700&family=Changa:wght@400;600;700&family=Rubik:wght@400;500;700&family=Open+Sans:wght@400;600;700&family=Roboto:wght@400;500;700&family=Poppins:wght@400;600;700&family=Playfair+Display:wght@400;700&family=Monospace&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #1a1d23;
            --panel-bg: #21252b;
            --text: #e1e4e8;
            --text-secondary: #959da5;
            --accent: #58a6ff;
            --accent2: #f78166;
            --border: #30363d;
            --hover: #292e36;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --radius: 12px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            background: var(--bg);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        /* ========== TOOLBAR ========== */
        #toolbar {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 6px 14px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            flex-wrap: wrap;
            justify-content: center;
        }
        #toolbar button {
            background: transparent;
            border: none;
            color: var(--text);
            cursor: pointer;
            padding: 9px 13px;
            border-radius: 25px;
            font-size: 13px;
            font-family: inherit;
            transition: var(--transition);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 500;
        }
        #toolbar button:hover {
            background: var(--hover);
            color: #fff;
        }
        #toolbar button.active {
            background: var(--accent);
            color: #fff;
            font-weight: 700;
        }
        #toolbar .divider {
            width: 1px;
            height: 24px;
            background: var(--border);
            margin: 0 4px;
            border-radius: 1px;
        }
        #toolbar .zoom-label {
            color: var(--text-secondary);
            font-size: 12px;
            padding: 0 8px;
            min-width: 45px;
            text-align: center;
            font-weight: 600;
        }

        /* ========== CANVAS ========== */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: grab;
        }
        #canvas-container:active {
            cursor: grabbing;
        }
        #canvas-container.grabbing {
            cursor: grabbing;
        }
        #canvas-container.node-hover {
            cursor: pointer;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* ========== STYLE PANEL ========== */
        #style-panel {
            position: fixed;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 99;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow);
            width: 260px;
            max-height: 75vh;
            overflow-y: auto;
            transition: var(--transition);
            opacity: 0;
            pointer-events: none;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        #style-panel.visible {
            opacity: 1;
            pointer-events: all;
        }
        #style-panel h3 {
            color: var(--text);
            margin-bottom: 10px;
            font-size: 15px;
            text-align: center;
            font-weight: 700;
        }
        #style-panel .section {
            margin-bottom: 14px;
        }
        #style-panel .section-label {
            color: var(--text-secondary);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            font-weight: 700;
        }
        #style-panel .color-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }
        #style-panel .color-swatch {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: var(--transition);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }
        #style-panel .color-swatch:hover {
            transform: scale(1.2);
            border-color: #fff;
            z-index: 2;
        }
        #style-panel .color-swatch.selected {
            border-color: #fff;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.3);
        }
        #style-panel input[type="color"] {
            width: 100%;
            height: 36px;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            background: var(--bg);
            padding: 2px;
        }
        #style-panel select,
        #style-panel input[type="range"] {
            width: 100%;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
            cursor: pointer;
            font-size: 13px;
        }
        #style-panel .shape-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }
        #style-panel .shape-btn {
            padding: 10px 4px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 11px;
            transition: var(--transition);
            text-align: center;
            font-family: inherit;
        }
        #style-panel .shape-btn:hover {
            border-color: var(--accent);
        }
        #style-panel .shape-btn.active {
            border-color: var(--accent);
            background: #1a3a5c;
            color: #fff;
            font-weight: 700;
        }
        #style-panel .btn-row {
            display: flex;
            gap: 6px;
        }
        #style-panel .btn-row button {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid var(--border);
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            transition: var(--transition);
            background: var(--bg);
            color: var(--text);
            font-weight: 600;
        }
        #style-panel .btn-row button.danger {
            border-color: #f8514960;
            color: #f85149;
        }
        #style-panel .btn-row button.danger:hover {
            background: #f8514920;
            border-color: #f85149;
        }
        #style-panel .btn-row button.primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            font-weight: 700;
        }
        #style-panel .btn-row button:hover {
            opacity: 0.85;
        }

        /* ========== CONTEXT MENU ========== */
        #context-menu {
            position: fixed;
            z-index: 200;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 6px 0;
            box-shadow: var(--shadow);
            min-width: 180px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        #context-menu.visible {
            opacity: 1;
            pointer-events: all;
        }
        #context-menu .menu-item {
            padding: 10px 16px;
            cursor: pointer;
            color: var(--text);
            font-size: 13px;
            transition: var(--transition);
            font-family: inherit;
            font-weight: 500;
        }
        #context-menu .menu-item:hover {
            background: var(--hover);
            color: #fff;
        }
        #context-menu .menu-divider {
            height: 1px;
            background: var(--border);
            margin: 4px 8px;
        }

        /* ========== TEXT EDIT INPUT ========== */
        #node-text-input {
            position: fixed;
            z-index: 150;
            border: 2px solid var(--accent);
            border-radius: 8px;
            padding: 6px 10px;
            font-family: inherit;
            font-size: 15px;
            outline: none;
            text-align: center;
            background: #fff;
            color: #1a1d23;
            min-width: 120px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            display: none;
            direction: rtl;
        }

        /* ========== TOAST ========== */
        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 300;
            background: #2ea043;
            color: #fff;
            padding: 10px 22px;
            border-radius: 25px;
            font-weight: 700;
            font-family: inherit;
            font-size: 14px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            box-shadow: var(--shadow);
        }
        #toast.show {
            opacity: 1;
        }

        /* ========== SCROLLBAR ========== */
        #style-panel::-webkit-scrollbar {
            width: 4px;
        }
        #style-panel::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        /* ========== MOBILE ========== */
        @media (max-width: 768px) {
            #toolbar {
                top: auto;
                bottom: 10px;
                padding: 5px 10px;
                gap: 3px;
                border-radius: 40px;
            }
            #toolbar button {
                padding: 7px 9px;
                font-size: 11px;
                gap: 3px;
            }
            #style-panel {
                right: 4px;
                width: 230px;
                max-height: 60vh;
                padding: 10px;
                border-radius: 10px;
            }
            #style-panel .color-swatch {
                width: 22px;
                height: 22px;
            }
            #style-panel .color-grid {
                grid-template-columns: repeat(6, 1fr);
                gap: 3px;
            }
            #context-menu {
                min-width: 150px;
            }
        }
    </style>
</head>
<body>

    <!-- TOOLBAR -->
    <div id="toolbar">
        <button onclick="mindMap.addRootNode()" title="إضافة عقدة رئيسية">➕ عقدة رئيسية</button>
        <button onclick="mindMap.addChildToSelected()" title="إضافة فرع">🌿 فرع</button>
        <button onclick="mindMap.addSiblingToSelected()" title="إضافة عقدة شقيقة">↔️ شقيقة</button>
        <span class="divider"></span>
        <button onclick="mindMap.undo()" title="تراجع">↩️</button>
        <button onclick="mindMap.redo()" title="إعادة">↪️</button>
        <span class="divider"></span>
        <button onclick="mindMap.autoArrange()" title="تنسيق تلقائي">🔮 تنسيق</button>
        <button onclick="mindMap.zoomIn()" title="تكبير">🔍+</button>
        <span class="zoom-label" id="zoom-label">100%</span>
        <button onclick="mindMap.zoomOut()" title="تصغير">🔍-</button>
        <button onclick="mindMap.resetView()" title="إعادة المعاينة">🏠</button>
        <span class="divider"></span>
        <button onclick="mindMap.exportPNG()" title="تصدير PNG">📥 تصدير</button>
        <button onclick="mindMap.saveToStorage()" title="حفظ">💾</button>
        <button onclick="mindMap.loadFromStorage()" title="تحميل">📂</button>
        <button onclick="mindMap.clearAll()" title="مسح الكل" style="color:#f85149;">🗑️</button>
    </div>

    <!-- CANVAS -->
    <div id="canvas-container">
        <canvas id="main-canvas"></canvas>
    </div>

    <!-- STYLE PANEL -->
    <div id="style-panel">
        <h3>🎨 تخصيص العقدة</h3>
        <div class="section">
            <div class="section-label">🎯 اللون</div>
            <div class="color-grid" id="color-grid"></div>
            <input type="color" id="custom-color" value="#4A90D9" style="margin-top:6px;">
        </div>
        <div class="section">
            <div class="section-label">📐 الشكل</div>
            <div class="shape-grid" id="shape-grid"></div>
        </div>
        <div class="section">
            <div class="section-label">🔤 الخط</div>
            <select id="font-select"></select>
        </div>
        <div class="section">
            <div class="section-label">📏 حجم الخط</div>
            <input type="range" id="font-size-slider" min="10" max="48" value="16" step="1">
            <span style="color:var(--text-secondary);font-size:11px;" id="font-size-val">16px</span>
        </div>
        <div class="section">
            <div class="section-label">✏️ نمط الحدود</div>
            <select id="border-style-select">
                <option value="solid">صلب Solid</option>
                <option value="dashed">متقطع Dashed</option>
                <option value="dotted">منقط Dotted</option>
                <option value="double">مزدوج Double</option>
            </select>
        </div>
        <div class="section">
            <div class="section-label">📏 سُمك الحدود</div>
            <input type="range" id="border-width-slider" min="0" max="8" value="2" step="0.5">
            <span style="color:var(--text-secondary);font-size:11px;" id="border-width-val">2px</span>
        </div>
        <div class="section">
            <label style="color:var(--text);cursor:pointer;display:flex;align-items:center;gap:6px;font-size:13px;">
                <input type="checkbox" id="shadow-toggle" checked> 🌑 ظل العقدة
            </label>
        </div>
        <div class="section btn-row">
            <button class="danger" onclick="mindMap.deleteSelected()">🗑️ حذف</button>
            <button class="primary" onclick="mindMap.addChildToSelected()">➕ فرع</button>
        </div>
    </div>

    <!-- CONTEXT MENU -->
    <div id="context-menu">
        <div class="menu-item" data-action="addChild">🌿 إضافة فرع</div>
        <div class="menu-item" data-action="addSibling">↔️ إضافة شقيقة</div>
        <div class="menu-divider"></div>
        <div class="menu-item" data-action="copyStyle">📋 نسخ النمط</div>
        <div class="menu-item" data-action="pasteStyle">📌 لصق النمط</div>
        <div class="menu-divider"></div>
        <div class="menu-item" data-action="delete" style="color:#f85149;">🗑️ حذف العقدة</div>
    </div>

    <!-- TEXT INPUT -->
    <input type="text" id="node-text-input" dir="rtl" placeholder="اكتب النص هنا...">

    <!-- TOAST -->
    <div id="toast"></div>

    <script>
        (function() {
            // ==================== MIND MAP ENGINE ====================
            class MindMap {
                constructor() {
                    this.nodes = {};
                    this.rootIds = [];
                    this.selectedNodeId = null;
                    this.hoveredNodeId = null;
                    this.offsetX = 0;
                    this.offsetY = 0;
                    this.zoom = 1;
                    this.minZoom = 0.1;
                    this.maxZoom = 5;
                    this.isPanning = false;
                    this.isDraggingNode = false;
                    this.panStart = { x: 0, y: 0 };
                    this.dragStart = { x: 0, y: 0 };
                    this.nodeDragStartPos = { x: 0, y: 0 };
                    this.lastMousePos = { x: 0, y: 0 };
                    this.history = [];
                    this.historyIndex = -1;
                    this.maxHistory = 100;
                    this.copiedStyle = null;
                    this.connectionColorMode = 'parent'; // 'parent' | 'gradient' | 'uniform'

                    // Canvas
                    this.canvas = document.getElementById('main-canvas');
                    this.ctx = this.canvas.getContext('2d');
                    this.container = document.getElementById('canvas-container');

                    // UI elements
                    this.stylePanel = document.getElementById('style-panel');
                    this.contextMenu = document.getElementById('context-menu');
                    this.textInput = document.getElementById('node-text-input');
                    this.toast = document.getElementById('toast');
                    this.zoomLabel = document.getElementById('zoom-label');

                    // Colors palette
                    this.colorPalette = [
                        '#4A90D9', '#5C6BC0', '#7E57C2', '#AB47BC', '#EC407A', '#EF5350',
                        '#FF7043', '#FFA726', '#FFCA28', '#FFEE58', '#9CCC65', '#66BB6A',
                        '#26A69A', '#26C6DA', '#29B6F6', '#42A5F5', '#78909C', '#8D6E63',
                        '#F06292', '#BA68C8', '#64B5F6', '#4DB6AC', '#FFB74D', '#E57373',
                        '#90A4AE', '#A1887F', '#7986CB', '#4DD0E1', '#FF8A65', '#AED581',
                        '#F06292', '#BA68C8', '#64B5F6', '#81C784', '#FFD54F', '#FF8A80'
                    ];

                    // Shapes
                    this.shapes = ['rounded', 'circle', 'rect', 'diamond', 'pill'];
                    this.shapeLabels = {
                        'rounded': '🔲 مدور',
                        'circle': '⚪ دائرة',
                        'rect': '⬜ مربع',
                        'diamond': '💎 معين',
                        'pill': '💊 كبسولة'
                    };

                    // Fonts
                    this.availableFonts = [
                        'Cairo',
                        'Amiri',
                        'Reem Kufi',
                        'El Messiri',
                        'Almarai',
                        'Changa',
                        'Rubik',
                        'Open Sans',
                        'Roboto',
                        'Poppins',
                        'Playfair Display',
                        'Arial',
                        'Tahoma',
                        'Trebuchet MS',
                        'Courier New',
                        'Georgia',
                        'Verdana',
                        'Impact',
                        'monospace'
                    ];

                    this.init();
                }

                init() {
                    this.resizeCanvas();
                    this.setupEventListeners();
                    this.buildColorGrid();
                    this.buildShapeGrid();
                    this.buildFontSelect();
                    this.setupStylePanelListeners();
                    this.setupContextMenu();
                    this.setupTextInput();
                    this.saveHistory();
                    this.render();
                    this.updateZoomLabel();

                    // Create initial central node
                    if (Object.keys(this.nodes).length === 0) {
                        const centerX = 0;
                        const centerY = 0;
                        const id = this.createNode('الفكرة الرئيسية 🧠', centerX, centerY, '#4A90D9', 'rounded');
                        this.rootIds = [id];
                        this.selectedNodeId = id;
                        this.saveHistory();
                        this.render();
                        this.showStylePanel();
                    }

                    // Center view on the node
                    this.centerView();
                }

                resizeCanvas() {
                    const dpr = window.devicePixelRatio || 1;
                    const w = window.innerWidth;
                    const h = window.innerHeight;
                    this.canvas.width = w * dpr;
                    this.canvas.height = h * dpr;
                    this.canvas.style.width = w + 'px';
                    this.canvas.style.height = h + 'px';
                    this.ctx.setTransform(1, 0, 0, 1, 0, 0);
                    this.ctx.scale(dpr, dpr);
                    this.canvasDisplayW = w;
                    this.canvasDisplayH = h;
                }

                setupEventListeners() {
                    window.addEventListener('resize', () => {
                        this.resizeCanvas();
                        this.render();
                    });

                    // Mouse events on canvas
                    this.canvas.addEventListener('mousedown', (e) => this.onMouseDown(e));
                    window.addEventListener('mousemove', (e) => this.onMouseMove(e));
                    window.addEventListener('mouseup', (e) => this.onMouseUp(e));
                    this.canvas.addEventListener('wheel', (e) => this.onWheel(e), { passive: false });
                    this.canvas.addEventListener('dblclick', (e) => this.onDoubleClick(e));
                    this.canvas.addEventListener('contextmenu', (e) => this.onContextMenu(e));

                    // Touch events
                    this.canvas.addEventListener('touchstart', (e) => this.onTouchStart(e), { passive: false });
                    this.canvas.addEventListener('touchmove', (e) => this.onTouchMove(e), { passive: false });
                    this.canvas.addEventListener('touchend', (e) => this.onTouchEnd(e));
                    this.canvas.addEventListener('touchcancel', (e) => this.onTouchEnd(e));

                    // Keyboard
                    window.addEventListener('keydown', (e) => this.onKeyDown(e));

                    // Close panels on click outside
                    window.addEventListener('click', (e) => {
                        if (!this.stylePanel.contains(e.target) && e.target !== this.canvas &&
                            !e.target.closest('#toolbar') && !e.target.closest('#context-menu') &&
                            e.target !== this.textInput) {
                            if (this.selectedNodeId && !this.isDraggingNode && !this._justSelected) {
                                // Keep selection but hide panel option
                            }
                        }
                    });

                    window.addEventListener('mousedown', (e) => {
                        if (!this.contextMenu.contains(e.target)) {
                            this.hideContextMenu();
                        }
                    });
                }

                // ---- Coordinate transforms ----
                screenToWorld(sx, sy) {
                    return {
                        x: (sx - this.offsetX) / this.zoom,
                        y: (sy - this.offsetY) / this.zoom
                    };
                }
                worldToScreen(wx, wy) {
                    return {
                        x: wx * this.zoom + this.offsetX,
                        y: wy * this.zoom + this.offsetY
                    };
                }

                // ---- Node management ----
                createNode(text, x, y, color, shape, fontFamily, fontSize) {
                    const id = 'node_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
                    const node = {
                        id,
                        text: text || 'عقدة جديدة',
                        x: x || 0,
                        y: y || 0,
                        width: 140,
                        height: 50,
                        color: color || '#4A90D9',
                        textColor: '#ffffff',
                        shape: shape || 'rounded',
                        fontFamily: fontFamily || 'Cairo',
                        fontSize: fontSize || 16,
                        fontWeight: '600',
                        borderStyle: 'solid',
                        borderWidth: 2,
                        borderColor: this.darkenColor(color || '#4A90D9', 0.25),
                        shadow: true,
                        children: [],
                        parent: null,
                        collapsed: false,
                    };
                    // Auto-calculate text color
                    node.textColor = this.getContrastColor(node.color);
                    node.borderColor = this.darkenColor(node.color, 0.25);
                    // Estimate width based on text
                    node.width = Math.max(100, Math.min(280, text.length * (fontSize || 16) * 0.65 + 40));
                    node.height = Math.max(40, (fontSize || 16) * 1.8 + 16);
                    this.nodes[id] = node;
                    return id;
                }

                addRootNode() {
                    const id = this.createNode('عقدة رئيسية', Math.random() * 300 - 150, Math.random() * 300 - 150,
                        this.colorPalette[Math.floor(Math.random() * this.colorPalette.length)], 'rounded');
                    this.rootIds.push(id);
                    this.selectedNodeId = id;
                    this.saveHistory();
                    this.render();
                    this.showStylePanel();
                    this.showToast('✅ تمت إضافة عقدة رئيسية');
                }

                addChildToSelected() {
                    if (!this.selectedNodeId || !this.nodes[this.selectedNodeId]) {
                        this.showToast('⚠️ الرجاء تحديد عقدة أولاً');
                        return;
                    }
                    const parent = this.nodes[this.selectedNodeId];
                    const angle = (parent.children.length * 0.6) - (Math.max(0, parent.children.length - 1) * 0.3) +
                        (Math.random() - 0.5) * 0.4;
                    const dist = 180 + Math.random() * 60;
                    const cx = parent.x + Math.cos(angle) * dist;
                    const cy = parent.y + Math.sin(angle) * dist;
                    const childColor = this.colorPalette[Math.floor(Math.random() * this.colorPalette.length)];
                    const childId = this.createNode('فرع جديد', cx, cy, childColor, parent.shape, parent.fontFamily, parent
                        .fontSize);
                    const child = this.nodes[childId];
                    child.parent = this.selectedNodeId;
                    parent.children.push(childId);
                    this.selectedNodeId = childId;
                    this.saveHistory();
                    this.render();
                    this.showStylePanel();
                    this.showToast('🌿 تمت إضافة فرع');
                }

                addSiblingToSelected() {
                    if (!this.selectedNodeId || !this.nodes[this.selectedNodeId]) {
                        this.showToast('⚠️ الرجاء تحديد عقدة أولاً');
                        return;
                    }
                    const node = this.nodes[this.selectedNodeId];
                    if (!node.parent || !this.nodes[node.parent]) {
                        // It's a root node, add another root
                        const id = this.createNode('عقدة شقيقة', node.x + 200, node.y + (Math.random() - 0.5) * 150,
                            this.colorPalette[Math.floor(Math.random() * this.colorPalette.length)],
                            node.shape, node.fontFamily, node.fontSize);
                        this.rootIds.push(id);
                        this.selectedNodeId = id;
                    } else {
                        const parent = this.nodes[node.parent];
                        const siblingAngle = Math.atan2(node.y - parent.y, node.x - parent.x) + 0.6 + (Math.random() -
                            0.5) * 0.3;
                        const dist = Math.sqrt((node.x - parent.x) ** 2 + (node.y - parent.y) ** 2);
                        const sx = parent.x + Math.cos(siblingAngle) * dist;
                        const sy = parent.y + Math.sin(siblingAngle) * dist;
                        const siblingId = this.createNode('عقدة شقيقة', sx, sy,
                            this.colorPalette[Math.floor(Math.random() * this.colorPalette.length)],
                            node.shape, node.fontFamily, node.fontSize);
                        const sibling = this.nodes[siblingId];
                        sibling.parent = node.parent;
                        parent.children.push(siblingId);
                        this.selectedNodeId = siblingId;
                    }
                    this.saveHistory();
                    this.render();
                    this.showStylePanel();
                    this.showToast('↔️ تمت إضافة عقدة شقيقة');
                }

                deleteSelected() {
                    if (!this.selectedNodeId || !this.nodes[this.selectedNodeId]) return;
                    this.deleteNode(this.selectedNodeId);
                    this.selectedNodeId = null;
                    this.hideStylePanel();
                    this.saveHistory();
                    this.render();
                    this.showToast('🗑️ تم حذف العقدة');
                }

                deleteNode(nodeId) {
                    const node = this.nodes[nodeId];
                    if (!node) return;
                    // Recursively delete children
                    if (node.children) {
                        [...node.children].forEach(childId => this.deleteNode(childId));
                    }
                    // Remove from parent
                    if (node.parent && this.nodes[node.parent]) {
                        const parent = this.nodes[node.parent];
                        parent.children = parent.children.filter(cid => cid !== nodeId);
                    }
                    // Remove from roots
                    this.rootIds = this.rootIds.filter(rid => rid !== nodeId);
                    // Delete node
                    delete this.nodes[nodeId];
                    if (this.selectedNodeId === nodeId) this.selectedNodeId = null;
                    if (this.hoveredNodeId === nodeId) this.hoveredNodeId = null;
                }

                clearAll() {
                    if (confirm('هل أنت متأكد من مسح جميع العقد؟ لا يمكن التراجع.')) {
                        this.nodes = {};
                        this.rootIds = [];
                        this.selectedNodeId = null;
                        this.hoveredNodeId = null;
                        this.history = [];
                        this.historyIndex = -1;
                        this.hideStylePanel();
                        this.saveHistory();
                        this.render();
                        this.showToast('🗑️ تم مسح الكل');
                    }
                }

                // ---- History (Undo/Redo) ----
                saveHistory() {
                    const snapshot = {
                        nodes: JSON.parse(JSON.stringify(this.nodes)),
                        rootIds: [...this.rootIds],
                        selectedNodeId: this.selectedNodeId,
                    };
                    // Remove future history if we're in the middle
                    if (this.historyIndex < this.history.length - 1) {
                        this.history = this.history.slice(0, this.historyIndex + 1);
                    }
                    this.history.push(snapshot);
                    if (this.history.length > this.maxHistory) {
                        this.history.shift();
                    } else {
                        this.historyIndex = this.history.length - 1;
                    }
                }

                undo() {
                    if (this.historyIndex <= 0) {
                        this.showToast('⚠️ لا يوجد تراجع');
                        return;
                    }
                    this.historyIndex--;
                    this.restoreSnapshot(this.history[this.historyIndex]);
                    this.render();
                    if (this.selectedNodeId) this.showStylePanel();
                    else this.hideStylePanel();
                    this.showToast('↩️ تراجع');
                }

                redo() {
                    if (this.historyIndex >= this.history.length - 1) {
                        this.showToast('⚠️ لا يوجد إعادة');
                        return;
                    }
                    this.historyIndex++;
                    this.restoreSnapshot(this.history[this.historyIndex]);
                    this.render();
                    if (this.selectedNodeId) this.showStylePanel();
                    else this.hideStylePanel();
                    this.showToast('↪️ إعادة');
                }

                restoreSnapshot(snapshot) {
                    this.nodes = JSON.parse(JSON.stringify(snapshot.nodes));
                    this.rootIds = [...snapshot.rootIds];
                    this.selectedNodeId = snapshot.selectedNodeId;
                    if (this.selectedNodeId && !this.nodes[this.selectedNodeId]) {
                        this.selectedNodeId = null;
                    }
                }

                // ---- Auto Arrange ----
                autoArrange() {
                    if (this.rootIds.length === 0) return;
                    const visited = new Set();

                    const arrangeChildren = (nodeId, angle, spread, radius) => {
                        const node = this.nodes[nodeId];
                        if (!node || node.children.length === 0) return;
                        const children = node.children.filter(cid => this.nodes[cid]);
                        const count = children.length;
                        const startAngle = angle - spread / 2;
                        children.forEach((childId, i) => {
                            const child = this.nodes[childId];
                            const childAngle = startAngle + (spread / Math.max(1, count - 1)) * i;
                            child.x = node.x + Math.cos(childAngle) * radius;
                            child.y = node.y + Math.sin(childAngle) * radius;
                            visited.add(childId);
                            const childSpread = Math.min(Math.PI, spread * 0.75);
                            const childRadius = radius * 0.75;
                            arrangeChildren(childId, childAngle, childSpread, Math.max(80, childRadius));
                        });
                    };

                    // Arrange root nodes in a circle
                    if (this.rootIds.length === 1) {
                        const root = this.nodes[this.rootIds[0]];
                        root.x = 0;
                        root.y = 0;
                        visited.add(this.rootIds[0]);
                        arrangeChildren(this.rootIds[0], -Math.PI / 2, Math.PI * 1.8, 200);
                    } else {
                        this.rootIds.forEach((rid, i) => {
                            const angle = (2 * Math.PI / this.rootIds.length) * i;
                            const r = Math.max(250, this.rootIds.length * 80);
                            const node = this.nodes[rid];
                            if (node) {
                                node.x = Math.cos(angle) * r;
                                node.y = Math.sin(angle) * r;
                                visited.add(rid);
                                arrangeChildren(rid, angle, Math.PI * 0.6, 160);
                            }
                        });
                    }

                    // Handle orphaned nodes
                    Object.keys(this.nodes).forEach(nid => {
                        if (!visited.has(nid) && !this.nodes[nid].parent) {
                            this.rootIds.push(nid);
                        }
                    });
                    this.rootIds = [...new Set(this.rootIds)];

                    this.saveHistory();
                    this.render();
                    this.showToast('🔮 تم التنسيق التلقائي');
                    this.centerView();
                }

                centerView() {
                    const allNodes = Object.values(this.nodes);
                    if (allNodes.length === 0) {
                        this.offsetX = this.canvasDisplayW / 2;
                        this.offsetY = this.canvasDisplayH / 2;
                        this.zoom = 1;
                    } else if (allNodes.length === 1) {
                        const node = allNodes[0];
                        this.offsetX = this.canvasDisplayW / 2 - node.x * this.zoom;
                        this.offsetY = this.canvasDisplayH / 2 - node.y * this.zoom;
                    } else {
                        let minX = Infinity,
                            minY = Infinity,
                            maxX = -Infinity,
                            maxY = -Infinity;
                        allNodes.forEach(n => {
                            minX = Math.min(minX, n.x - n.width / 2);
                            minY = Math.min(minY, n.y - n.height / 2);
                            maxX = Math.max(maxX, n.x + n.width / 2);
                            maxY = Math.max(maxY, n.y + n.height / 2);
                        });
                        const cx = (minX + maxX) / 2;
                        const cy = (minY + maxY) / 2;
                        const w = maxX - minX + 100;
                        const h = maxY - minY + 100;
                        const fitZoom = Math.min(this.canvasDisplayW / w, this.canvasDisplayH / h, 2);
                        this.zoom = Math.max(0.2, Math.min(2, fitZoom));
                        this.offsetX = this.canvasDisplayW / 2 - cx * this.zoom;
                        this.offsetY = this.canvasDisplayH / 2 - cy * this.zoom;
                    }
                    this.updateZoomLabel();
                    this.render();
                }

                resetView() {
                    this.centerView();
                    this.showToast('🏠 تمت إعادة المعاينة');
                }

                zoomIn() {
                    const cx = this.canvasDisplayW / 2;
                    const cy = this.canvasDisplayH / 2;
                    const worldBefore = this.screenToWorld(cx, cy);
                    this.zoom = Math.min(this.maxZoom, this.zoom * 1.25);
                    const worldAfter = this.screenToWorld(cx, cy);
                    this.offsetX += (worldAfter.x - worldBefore.x) * this.zoom;
                    this.offsetY += (worldAfter.y - worldBefore.y) * this.zoom;
                    this.updateZoomLabel();
                    this.render();
                }

                zoomOut() {
                    const cx = this.canvasDisplayW / 2;
                    const cy = this.canvasDisplayH / 2;
                    const worldBefore = this.screenToWorld(cx, cy);
                    this.zoom = Math.max(this.minZoom, this.zoom / 1.25);
                    const worldAfter = this.screenToWorld(cx, cy);
                    this.offsetX += (worldAfter.x - worldBefore.x) * this.zoom;
                    this.offsetY += (worldAfter.y - worldBefore.y) * this.zoom;
                    this.updateZoomLabel();
                    this.render();
                }

                updateZoomLabel() {
                    if (this.zoomLabel) {
                        this.zoomLabel.textContent = Math.round(this.zoom * 100) + '%';
                    }
                }

                // ---- Mouse handlers ----
                onMouseDown(e) {
                    if (e.button === 1 || (e.button === 0 && e.altKey)) {
                        // Middle mouse or Alt+Left = pan
                        this.isPanning = true;
                        this.panStart = { x: e.clientX, y: e.clientY };
                        this.container.classList.add('grabbing');
                        e.preventDefault();
                        return;
                    }
                    if (e.button === 0) {
                        const world = this.screenToWorld(e.clientX, e.clientY);
                        const hitNode = this.hitTest(world.x, world.y);
                        if (hitNode) {
                            if (e.shiftKey) {
                                // Shift+click to add to selection or toggle
                                this.selectedNodeId = hitNode.id;
                            } else {
                                this.selectedNodeId = hitNode.id;
                                this.isDraggingNode = true;
                                this.nodeDragStartPos = { x: hitNode.x, y: hitNode.y };
                                this.dragStart = { x: e.clientX, y: e.clientY };
                            }
                            this._justSelected = true;
                            setTimeout(() => { this._justSelected = false; }, 100);
                            this.showStylePanel();
                            this.updateStylePanel();
                            this.render();
                        } else {
                            // Start panning
                            this.isPanning = true;
                            this.panStart = { x: e.clientX, y: e.clientY };
                            this.selectedNodeId = null;
                            this.hideStylePanel();
                            this.render();
                            this.container.classList.add('grabbing');
                        }
                        this.hideContextMenu();
                    }
                }

                onMouseMove(e) {
                    this.lastMousePos = { x: e.clientX, y: e.clientY };
                    const world = this.screenToWorld(e.clientX, e.clientY);

                    if (this.isDraggingNode && this.selectedNodeId && this.nodes[this.selectedNodeId]) {
                        const dx = (e.clientX - this.dragStart.x) / this.zoom;
                        const dy = (e.clientY - this.dragStart.y) / this.zoom;
                        const node = this.nodes[this.selectedNodeId];
                        node.x = this.nodeDragStartPos.x + dx;
                        node.y = this.nodeDragStartPos.y + dy;
                        this.render();
                        this.container.style.cursor = 'grabbing';
                        return;
                    }

                    if (this.isPanning) {
                        const dx = e.clientX - this.panStart.x;
                        const dy = e.clientY - this.panStart.y;
                        this.offsetX += dx;
                        this.offsetY += dy;
                        this.panStart = { x: e.clientX, y: e.clientY };
                        this.render();
                        return;
                    }

                    // Hover detection
                    const hitNode = this.hitTest(world.x, world.y);
                    if (hitNode) {
                        this.hoveredNodeId = hitNode.id;
                        this.container.classList.add('node-hover');
                        this.container.style.cursor = 'pointer';
                    } else {
                        this.hoveredNodeId = null;
                        this.container.classList.remove('node-hover');
                        this.container.style.cursor = 'grab';
                    }
                    if (this.hoveredNodeId !== this._lastHovered) {
                        this._lastHovered = this.hoveredNodeId;
                        this.render();
                    }
                }

                onMouseUp(e) {
                    if (this.isDraggingNode) {
                        const node = this.nodes[this.selectedNodeId];
                        if (node && (node.x !== this.nodeDragStartPos.x || node.y !== this.nodeDragStartPos.y)) {
                            this.saveHistory();
                        }
                        this.isDraggingNode = false;
                        this.container.style.cursor = this.hoveredNodeId ? 'pointer' : 'grab';
                        this.render();
                    }
                    if (this.isPanning) {
                        this.isPanning = false;
                        this.container.classList.remove('grabbing');
                        this.container.style.cursor = this.hoveredNodeId ? 'pointer' : 'grab';
                    }
                }

                onWheel(e) {
                    e.preventDefault();
                    const worldBefore = this.screenToWorld(e.clientX, e.clientY);
                    const zoomFactor = e.deltaY < 0 ? 1.08 : 1 / 1.08;
                    const newZoom = Math.max(this.minZoom, Math.min(this.maxZoom, this.zoom * zoomFactor));
                    this.zoom = newZoom;
                    const worldAfter = this.screenToWorld(e.clientX, e.clientY);
                    this.offsetX += (worldAfter.x - worldBefore.x) * this.zoom;
                    this.offsetY += (worldAfter.y - worldBefore.y) * this.zoom;
                    this.updateZoomLabel();
                    this.render();
                }

                onDoubleClick(e) {
                    const world = this.screenToWorld(e.clientX, e.clientY);
                    const hitNode = this.hitTest(world.x, world.y);
                    if (hitNode) {
                        this.selectedNodeId = hitNode.id;
                        this.showStylePanel();
                        this.updateStylePanel();
                        this.startTextEdit(hitNode);
                    } else {
                        // Create new root node at click position
                        const id = this.createNode('عقدة جديدة', world.x, world.y,
                            this.colorPalette[Math.floor(Math.random() * this.colorPalette.length)],
                            'rounded');
                        this.rootIds.push(id);
                        this.selectedNodeId = id;
                        this.saveHistory();
                        this.render();
                        this.showStylePanel();
                        this.updateStylePanel();
                        this.startTextEdit(this.nodes[id]);
                        this.showToast('✨ تم إنشاء عقدة جديدة');
                    }
                }

                onContextMenu(e) {
                    e.preventDefault();
                    const world = this.screenToWorld(e.clientX, e.clientY);
                    const hitNode = this.hitTest(world.x, world.y);
                    if (hitNode) {
                        this.selectedNodeId = hitNode.id;
                        this.showStylePanel();
                        this.updateStylePanel();
                        this.showContextMenu(e.clientX, e.clientY);
                        this.render();
                    } else {
                        this.hideContextMenu();
                    }
                }

                // ---- Touch handlers ----
                onTouchStart(e) {
                    if (e.touches.length === 2) {
                        this.isPanning = false;
                        this.isDraggingNode = false;
                        this._pinchStartDist = Math.hypot(
                            e.touches[0].clientX - e.touches[1].clientX,
                            e.touches[0].clientY - e.touches[1].clientY
                        );
                        this._pinchStartZoom = this.zoom;
                        this._pinchMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                        this._pinchMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                        return;
                    }
                    if (e.touches.length === 1) {
                        const touch = e.touches[0];
                        const world = this.screenToWorld(touch.clientX, touch.clientY);
                        const hitNode = this.hitTest(world.x, world.y);
                        if (hitNode) {
                            this.selectedNodeId = hitNode.id;
                            this.isDraggingNode = true;
                            this.nodeDragStartPos = { x: hitNode.x, y: hitNode.y };
                            this.dragStart = { x: touch.clientX, y: touch.clientY };
                            this.showStylePanel();
                            this.updateStylePanel();
                            this.render();
                        } else {
                            this.isPanning = true;
                            this.panStart = { x: touch.clientX, y: touch.clientY };
                            this.selectedNodeId = null;
                            this.hideStylePanel();
                            this.render();
                        }
                        this.hideContextMenu();
                    }
                }

                onTouchMove(e) {
                    e.preventDefault();
                    if (e.touches.length === 2 && this._pinchStartDist) {
                        const dist = Math.hypot(
                            e.touches[0].clientX - e.touches[1].clientX,
                            e.touches[0].clientY - e.touches[1].clientY
                        );
                        const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                        const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                        const worldBefore = this.screenToWorld(midX, midY);
                        const newZoom = Math.max(this.minZoom, Math.min(this.maxZoom,
                            this._pinchStartZoom * (dist / this._pinchStartDist)));
                        this.zoom = newZoom;
                        const worldAfter = this.screenToWorld(midX, midY);
                        this.offsetX += (worldAfter.x - worldBefore.x) * this.zoom;
                        this.offsetY += (worldAfter.y - worldBefore.y) * this.zoom;
                        this.updateZoomLabel();
                        this.render();
                        return;
                    }
                    if (this.isDraggingNode && e.touches.length === 1 && this.selectedNodeId && this.nodes[this
                            .selectedNodeId]) {
                        const touch = e.touches[0];
                        const dx = (touch.clientX - this.dragStart.x) / this.zoom;
                        const dy = (touch.clientY - this.dragStart.y) / this.zoom;
                        const node = this.nodes[this.selectedNodeId];
                        node.x = this.nodeDragStartPos.x + dx;
                        node.y = this.nodeDragStartPos.y + dy;
                        this.render();
                        return;
                    }
                    if (this.isPanning && e.touches.length === 1) {
                        const touch = e.touches[0];
                        const dx = touch.clientX - this.panStart.x;
                        const dy = touch.clientY - this.panStart.y;
                        this.offsetX += dx;
                        this.offsetY += dy;
                        this.panStart = { x: touch.clientX, y: touch.clientY };
                        this.render();
                    }
                }

                onTouchEnd(e) {
                    if (this.isDraggingNode && this.selectedNodeId && this.nodes[this.selectedNodeId]) {
                        const node = this.nodes[this.selectedNodeId];
                        if (node.x !== this.nodeDragStartPos.x || node.y !== this.nodeDragStartPos.y) {
                            this.saveHistory();
                        }
                    }
                    this.isDraggingNode = false;
                    this.isPanning = false;
                    this._pinchStartDist = null;
                    this.render();
                }

                // ---- Keyboard ----
                onKeyDown(e) {
                    if (e.target === this.textInput || e.target.tagName === 'INPUT' || e.target.tagName ===
                        'TEXTAREA' || e.target.tagName === 'SELECT') {
                        if (e.key === 'Escape') {
                            this.finishTextEdit();
                            e.preventDefault();
                        }
                        return;
                    }
                    switch (e.key) {
                        case 'Delete':
                        case 'Backspace':
                            if (this.selectedNodeId) {
                                this.deleteSelected();
                                e.preventDefault();
                            }
                            break;
                        case 'Tab':
                            if (this.selectedNodeId) {
                                this.addChildToSelected();
                                e.preventDefault();
                            }
                            break;
                        case 'Enter':
                            if (this.selectedNodeId) {
                                this.addSiblingToSelected();
                                e.preventDefault();
                            }
                            break;
                        case 'Escape':
                            this.selectedNodeId = null;
                            this.hideStylePanel();
                            this.render();
                            break;
                        case 'f':
                        case 'F':
                            if (e.ctrlKey || e.metaKey) {
                                // Focus search/find - not implemented, just center
                                this.centerView();
                                e.preventDefault();
                            }
                            break;
                        case 'z':
                            if (e.ctrlKey || e.metaKey) {
                                if (e.shiftKey) this.redo();
                                else this.undo();
                                e.preventDefault();
                            }
                            break;
                        case 'y':
                            if (e.ctrlKey || e.metaKey) {
                                this.redo();
                                e.preventDefault();
                            }
                            break;
                        case 's':
                            if (e.ctrlKey || e.metaKey) {
                                this.saveToStorage();
                                e.preventDefault();
                            }
                            break;
                        case '+':
                        case '=':
                            if (e.ctrlKey || e.metaKey) {
                                this.zoomIn();
                                e.preventDefault();
                            }
                            break;
                        case '-':
                            if (e.ctrlKey || e.metaKey) {
                                this.zoomOut();
                                e.preventDefault();
                            }
                            break;
                        case '0':
                            if (e.ctrlKey || e.metaKey) {
                                this.resetView();
                                e.preventDefault();
                            }
                            break;
                    }
                }

                // ---- Hit testing ----
                hitTest(wx, wy) {
                    // Check nodes in reverse order (top-most first) - for now just iterate
                    const allNodes = Object.values(this.nodes);
                    // Sort by y then x for some consistency, but check all
                    for (let i = allNodes.length - 1; i >= 0; i--) {
                        const node = allNodes[i];
                        if (this.isPointInNode(wx, wy, node)) {
                            return node;
                        }
                    }
                    return null;
                }

                isPointInNode(wx, wy, node) {
                    const hw = node.width / 2;
                    const hh = node.height / 2;
                    const cx = node.x;
                    const cy = node.y;
                    switch (node.shape) {
                        case 'circle':
                            const rx = hw;
                            const ry = hh;
                            return ((wx - cx) ** 2) / (rx ** 2) + ((wy - cy) ** 2) / (ry ** 2) <= 1;
                        case 'diamond':
                            const dx = Math.abs(wx - cx);
                            const dy = Math.abs(wy - cy);
                            return (dx / hw + dy / hh) <= 1;
                        case 'pill':
                            if (Math.abs(wx - cx) <= hw - hh && Math.abs(wy - cy) <= hh) return true;
                            const pillRx = hh;
                            const pillRy = hh;
                            const nearestX = Math.max(cx - hw + hh, Math.min(wx, cx + hw - hh));
                            return ((wx - nearestX) ** 2) / (pillRx ** 2) + ((wy - cy) ** 2) / (pillRy ** 2) <= 1;
                        case 'rounded':
                        case 'rect':
                        default:
                            const margin = node.shape === 'rounded' ? Math.min(hw, hh, 12) : 0;
                            return wx >= cx - hw && wx <= cx + hw && wy >= cy - hh && wy <= cy + hh;
                    }
                }

                // ---- Text editing ----
                startTextEdit(node) {
                    const screen = this.worldToScreen(node.x, node.y);
                    this.textInput.style.display = 'block';
                    this.textInput.value = node.text;
                    this.textInput.style.fontFamily = node.fontFamily + ', sans-serif';
                    this.textInput.style.fontSize = (node.fontSize * this.zoom) + 'px';
                    this.textInput.style.left = (screen.x - node.width * this.zoom / 2) + 'px';
                    this.textInput.style.top = (screen.y - node.height * this.zoom / 2 - 5) + 'px';
                    this.textInput.style.minWidth = (node.width * this.zoom) + 'px';
                    this.textInput.style.textAlign = 'center';
                    this.textInput.focus();
                    this.textInput.select();
                    this._editingNodeId = node.id;
                }

                finishTextEdit() {
                    if (this._editingNodeId && this.nodes[this._editingNodeId]) {
                        const node = this.nodes[this._editingNodeId];
                        const newText = this.textInput.value.trim() || node.text;
                        if (newText !== node.text) {
                            node.text = newText;
                            node.width = Math.max(100, Math.min(280, newText.length * node.fontSize * 0.65 + 40));
                            node.height = Math.max(40, node.fontSize * 1.8 + 16);
                            this.saveHistory();
                        }
                    }
                    this.textInput.style.display = 'none';
                    this._editingNodeId = null;
                    this.render();
                    if (this.selectedNodeId) this.updateStylePanel();
                }

                setupTextInput() {
                    this.textInput.addEventListener('blur', () => {
                        setTimeout(() => this.finishTextEdit(), 150);
                    });
                    this.textInput.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            this.finishTextEdit();
                        }
                        if (e.key === 'Escape') {
                            this.textInput.value = this.nodes[this._editingNodeId]?.text || '';
                            this.finishTextEdit();
                        }
                    });
                    this.textInput.addEventListener('input', () => {
                        if (this._editingNodeId && this.nodes[this._editingNodeId]) {
                            const node = this.nodes[this._editingNodeId];
                            const newText = this.textInput.value;
                            const estWidth = Math.max(100, Math.min(280, newText.length * node.fontSize * 0.65 +
                                40));
                            this.textInput.style.minWidth = (estWidth * this.zoom) + 'px';
                        }
                    });
                }

                // ---- Style Panel ----
                showStylePanel() {
                    this.stylePanel.classList.add('visible');
                    this.updateStylePanel();
                }
                hideStylePanel() {
                    this.stylePanel.classList.remove('visible');
                }
                updateStylePanel() {
                    if (!this.selectedNodeId || !this.nodes[this.selectedNodeId]) return;
                    const node = this.nodes[this.selectedNodeId];
                    document.getElementById('custom-color').value = node.color;
                    document.getElementById('font-select').value = node.fontFamily;
                    document.getElementById('font-size-slider').value = node.fontSize;
                    document.getElementById('font-size-val').textContent = node.fontSize + 'px';
                    document.getElementById('border-style-select').value = node.borderStyle;
                    document.getElementById('border-width-slider').value = node.borderWidth;
                    document.getElementById('border-width-val').textContent = node.borderWidth + 'px';
                    document.getElementById('shadow-toggle').checked = node.shadow;
                    this.updateShapeGridActive();
                    this.updateColorGridSelection();
                }

                buildColorGrid() {
                    const grid = document.getElementById('color-grid');
                    grid.innerHTML = '';
                    this.colorPalette.forEach(color => {
                        const swatch = document.createElement('div');
                        swatch.className = 'color-swatch';
                        swatch.style.backgroundColor = color;
                        swatch.title = color;
                        swatch.addEventListener('click', () => {
                            if (this.selectedNodeId && this.nodes[this.selectedNodeId]) {
                                const node = this.nodes[this.selectedNodeId];
                                node.color = color;
                                node.textColor = this.getContrastColor(color);
                                node.borderColor = this.darkenColor(color, 0.25);
                                this.saveHistory();
                                this.render();
                                this.updateStylePanel();
                            }
                        });
                        grid.appendChild(swatch);
                    });
                }

                updateColorGridSelection() {
                    if (!this.selectedNodeId || !this.nodes[this.selectedNodeId]) return;
                    const node = this.nodes[this.selectedNodeId];
                    const swatches = document.querySelectorAll('#color-grid .color-swatch');
                    swatches.forEach(s => {
                        s.classList.toggle('selected', s.style.backgroundColor === node.color ||
                            this.colorsEqual(s.style.backgroundColor, node.color));
                    });
                }

                colorsEqual(c1, c2) {
                    const toHex = (c) => {
                        if (c.startsWith('#')) return c.toLowerCase();
                        const d = document.createElement('div');
                        d.style.color = c;
                        document.body.appendChild(d);
                        const comp = getComputedStyle(d).color;
                        document.body.removeChild(d);
                        const match = comp.match(/\d+/g);
                        if (!match) return c;
                        return '#' + match.slice(0, 3).map(x => parseInt(x).toString(16).padStart(2, '0'))
                            .join('');
                    };
                    return toHex(c1) === toHex(c2);
                }

                buildShapeGrid() {
                    const grid = document.getElementById('shape-grid');
                    grid.innerHTML = '';
                    this.shapes.forEach(shape => {
                        const btn = document.createElement('button');
                        btn.className = 'shape-btn';
                        btn.textContent = this.shapeLabels[shape] || shape;
                        btn.dataset.shape = shape;
                        btn.addEventListener('click', () => {
                            if (this.selectedNodeId && this.nodes[this.selectedNodeId]) {
                                this.nodes[this.selectedNodeId].shape = shape;
                                this.saveHistory();
                                this.render();
                                this.updateStylePanel();
                            }
                        });
                        grid.appendChild(btn);
                    });
                }

                updateShapeGridActive() {
                    if (!this.selectedNodeId || !this.nodes[this.selectedNodeId]) return;
                    const node = this.nodes[this.selectedNodeId];
                    const btns = document.querySelectorAll('#shape-grid .shape-btn');
                    btns.forEach(b => {
                        b.classList.toggle('active', b.dataset.shape === node.shape);
                    });
                }

                buildFontSelect() {
                    const select = document.getElementById('font-select');
                    select.innerHTML = '';
                    this.availableFonts.forEach(font => {
                        const opt = document.createElement('option');
                        opt.value = font;
                        opt.textContent = font;
                        opt.style.fontFamily = font + ', sans-serif';
                        select.appendChild(opt);
                    });
                }

                setupStylePanelListeners() {
                    document.getElementById('custom-color').addEventListener('input', (e) => {
                        if (this.selectedNodeId && this.nodes[this.selectedNodeId]) {
                            const node = this.nodes[this.selectedNodeId];
                            node.color = e.target.value;
                            node.textColor = this.getContrastColor(e.target.value);
                            node.borderColor = this.darkenColor(e.target.value, 0.25);
                            this.render();
                            this.updateColorGridSelection();
                        }
                    });
                    document.getElementById('custom-color').addEventListener('change', () => {
                        this.saveHistory();
                        this.render();
                    });

                    document.getElementById('font-select').addEventListener('change', (e) => {
                        if (this.selectedNodeId && this.nodes[this.selectedNodeId]) {
                            this.nodes[this.selectedNodeId].fontFamily = e.target.value;
                            this.saveHistory();
                            this.render();
                        }
                    });

                    document.getElementById('font-size-slider').addEventListener('input', (e) => {
                        if (this.selectedNodeId && this.nodes[this.selectedNodeId]) {
                            const node = this.nodes[this.selectedNodeId];
                            node.fontSize = parseInt(e.target.value);
                            node.width = Math.max(100, Math.min(280, node.text.length * node.fontSize *
                                0.65 + 40));
                            node.height = Math.max(40, node.fontSize * 1.8 + 16);
                            document.getElementById('font-size-val').textContent = node.fontSize + 'px';
                            this.render();
                        }
                    });
                    document.getElementById('font-size-slider').addEventListener('change', () => {
                        this.saveHistory();
                        this.render();
                    });

                    document.getElementById('border-style-select').addEventListener('change', (e) => {
                        if (this.selectedNodeId && this.nodes[this.selectedNodeId]) {
                            this.nodes[this.selectedNodeId].borderStyle = e.target.value;
                            this.saveHistory();
                            this.render();
                        }
                    });

                    document.getElementById('border-width-slider').addEventListener('input', (e) => {
                        if (this.selectedNodeId && this.nodes[this.selectedNodeId]) {
                            this.nodes[this.selectedNodeId].borderWidth = parseFloat(e.target.value);
                            document.getElementById('border-width-val').textContent = parseFloat(e.target
                                .value) + 'px';
                            this.render();
                        }
                    });
                    document.getElementById('border-width-slider').addEventListener('change', () => {
                        this.saveHistory();
                        this.render();
                    });

                    document.getElementById('shadow-toggle').addEventListener('change', (e) => {
                        if (this.selectedNodeId && this.nodes[this.selectedNodeId]) {
                            this.nodes[this.selectedNodeId].shadow = e.target.checked;
                            this.saveHistory();
                            this.render();
                        }
                    });
                }

                // ---- Context Menu ----
                setupContextMenu() {
                    const items = this.contextMenu.querySelectorAll('.menu-item');
                    items.forEach(item => {
                        item.addEventListener('click', () => {
                            const action = item.dataset.action;
                            this.handleContextAction(action);
                            this.hideContextMenu();
                        });
                    });
                }

                showContextMenu(x, y) {
                    this.contextMenu.style.left = Math.min(x, window.innerWidth - 200) + 'px';
                    this.contextMenu.style.top = Math.min(y, window.innerHeight - 250) + 'px';
                    this.contextMenu.classList.add('visible');
                }
                hideContextMenu() {
                    this.contextMenu.classList.remove('visible');
                }

                handleContextAction(action) {
                    switch (action) {
                        case 'addChild':
                            this.addChildToSelected();
                            break;
                        case 'addSibling':
                            this.addSiblingToSelected();
                            break;
                        case 'copyStyle':
                            if (this.selectedNodeId && this.nodes[this.selectedNodeId]) {
                                const node = this.nodes[this.selectedNodeId];
                                this.copiedStyle = {
                                    color: node.color,
                                    shape: node.shape,
                                    fontFamily: node.fontFamily,
                                    fontSize: node.fontSize,
                                    borderStyle: node.borderStyle,
                                    borderWidth: node.borderWidth,
                                    shadow: node.shadow,
                                };
                                this.showToast('📋 تم نسخ النمط');
                            }
                            break;
                        case 'pasteStyle':
                            if (this.copiedStyle && this.selectedNodeId && this.nodes[this.selectedNodeId]) {
                                const node = this.nodes[this.selectedNodeId];
                                Object.assign(node, this.copiedStyle);
                                node.textColor = this.getContrastColor(node.color);
                                node.borderColor = this.darkenColor(node.color, 0.25);
                                this.saveHistory();
                                this.render();
                                this.updateStylePanel();
                                this.showToast('📌 تم لصق النمط');
                            }
                            break;
                        case 'delete':
                            this.deleteSelected();
                            break;
                    }
                }

                // ---- Rendering ----
                render() {
                    const ctx = this.ctx;
                    const w = this.canvasDisplayW;
                    const h = this.canvasDisplayH;
                    ctx.clearRect(0, 0, w, h);

                    // Background
                    ctx.fillStyle = '#f8f9fa';
                    ctx.fillRect(0, 0, w, h);

                    // Grid dots
                    ctx.fillStyle = '#dde1e6';
                    const dotSpacing = 30;
                    const worldTopLeft = this.screenToWorld(0, 0);
                    const worldBottomRight = this.screenToWorld(w, h);
                    const startX = Math.floor(worldTopLeft.x / dotSpacing) * dotSpacing;
                    const startY = Math.floor(worldTopLeft.y / dotSpacing) * dotSpacing;
                    for (let wx = startX; wx <= worldBottomRight.x; wx += dotSpacing) {
                        for (let wy = startY; wy <= worldBottomRight.y; wy += dotSpacing) {
                            const screen = this.worldToScreen(wx, wy);
                            ctx.beginPath();
                            ctx.arc(screen.x, screen.y, 1.5, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }

                    // Apply transform for nodes
                    ctx.save();
                    ctx.translate(this.offsetX, this.offsetY);
                    ctx.scale(this.zoom, this.zoom);

                    // Draw connections
                    const drawnConnections = new Set();
                    Object.values(this.nodes).forEach(node => {
                        if (node.children && node.children.length > 0) {
                            node.children.forEach(childId => {
                                const child = this.nodes[childId];
                                if (child && !drawnConnections.has(node.id + '_' + childId)) {
                                    drawnConnections.add(node.id + '_' + childId);
                                    this.drawConnection(node, child);
                                }
                            }
                        );
                    }
                });

                // Draw nodes
                Object.values(this.nodes).forEach(node => {
                    this.drawNode(node);
                });

                ctx.restore();

                // Draw zoom-independent UI hints
                if (Object.keys(this.nodes).length <= 1 && this.rootIds.length <= 1) {
                    ctx.fillStyle = '#b0b8c1';
                    ctx.font = '16px Cairo, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('💡 انقر مرتين على المساحة الفارغة لإنشاء عقدة جديدة', w / 2, h - 40);
                    ctx.fillText('🖱️ اسحب للتحريك | عجلة الفأرة للتكبير | انقر مرتين على العقدة للتعديل', w / 2, h - 18);
                }
            }

            drawConnection(parent, child) {
                const ctx = this.ctx;
                const pEdge = this.getEdgePoint(parent, child.x, child.y);
                const cEdge = this.getEdgePoint(child, parent.x, parent.y);

                ctx.beginPath();
                ctx.moveTo(pEdge.x, pEdge.y);

                // Bezier control points
                const dx = cEdge.x - pEdge.x;
                const dy = cEdge.y - pEdge.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const cpOffset = Math.min(dist * 0.45, 180);

                const angle1 = Math.atan2(cEdge.y - pEdge.y, cEdge.x - pEdge.x);
                const cp1x = pEdge.x + Math.cos(angle1) * cpOffset;
                const cp1y = pEdge.y + Math.sin(angle1) * cpOffset;

                const angle2 = Math.atan2(pEdge.y - cEdge.y, pEdge.x - cEdge.x);
                const cp2x = cEdge.x + Math.cos(angle2) * cpOffset;
                const cp2y = cEdge.y + Math.sin(angle2) * cpOffset;

                ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, cEdge.x, cEdge.y);

                ctx.strokeStyle = parent.color;
                ctx.lineWidth = Math.max(1.5, 3 / this.zoom);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.globalAlpha = 0.7;
                ctx.stroke();
                ctx.globalAlpha = 1;
            }

            getEdgePoint(node, targetX, targetY) {
                const angle = Math.atan2(targetY - node.y, targetX - node.x);
                const hw = node.width / 2;
                const hh = node.height / 2;

                switch (node.shape) {
                    case 'circle':
                        const rx = hw;
                        const ry = hh;
                        const r = (rx * ry) / Math.sqrt((ry * Math.cos(angle)) ** 2 + (rx * Math.sin(angle)) ** 2);
                        return {
                            x: node.x + Math.cos(angle) * r,
                            y: node.y + Math.sin(angle) * r,
                        };
                    case 'diamond':
