                        const ddx = Math.abs(Math.cos(angle));
                        const ddy = Math.abs(Math.sin(angle));
                        const dr = (ddx / hw + ddy / hh);
                        const dEdgeR = 1 / Math.max(0.001, dr);
                        return {
                            x: node.x + Math.cos(angle) * Math.min(dEdgeR, Math.hypot(hw, hh)),
                            y: node.y + Math.sin(angle) * Math.min(dEdgeR, Math.hypot(hw, hh)),
                        };
                    case 'pill':
                        const pillHw = hw;
                        const pillHh = hh;
                        if (pillHw <= pillHh) {
                            const pr = pillHw;
                            return {
                                x: node.x + Math.cos(angle) * pr,
                                y: node.y + Math.sin(angle) * pr,
                            };
                        }
                        const straightLen = pillHw - pillHh;
                        const cxCheck = node.x + Math.cos(angle) * straightLen;
                        if (Math.abs(cxCheck - node.x) <= straightLen && Math.abs(Math.sin(angle) * pillHh) <=
                            pillHh) {
                            const t = straightLen / Math.max(0.001, Math.abs(Math.cos(angle)) * pillHw * 2);
                            return {
                                x: node.x + Math.cos(angle) * Math.min(pillHw, t * pillHw),
                                y: node.y + Math.sin(angle) * Math.min(pillHh, t * pillHh),
                            };
                        }
                        const pcx = node.x + Math.sign(Math.cos(angle)) * straightLen;
                        const pr2 = pillHh;
                        const pdx = node.x + Math.cos(angle) * pillHw - pcx;
                        const pdy = node.y + Math.sin(angle) * pillHh;
                        const pdist = Math.sqrt(pdx * pdx + pdy * pdy);
                        return {
                            x: pcx + (pdx / pdist) * pr2,
                            y: node.y + (pdy / pdist) * pr2,
                        };
                    case 'rounded':
                    case 'rect':
                    default:
                        const cornerRadius = node.shape === 'rounded' ? Math.min(hw, hh, 12) : 0;
                        const ax = Math.abs(Math.cos(angle));
                        const ay = Math.abs(Math.sin(angle));
                        const tx = ax > 0.0001 ? hw / ax : Infinity;
                        const ty = ay > 0.0001 ? hh / ay : Infinity;
                        const t = Math.min(tx, ty);
                        return {
                            x: node.x + Math.cos(angle) * Math.min(t, Math.hypot(hw, hh)),
                            y: node.y + Math.sin(angle) * Math.min(t, Math.hypot(hw, hh)),
                        };
                }
            }

            drawNode(node) {
                const ctx = this.ctx;
                const x = node.x;
                const y = node.y;
                const w = node.width;
                const h = node.height;
                const isSelected = node.id === this.selectedNodeId;
                const isHovered = node.id === this.hoveredNodeId;

                ctx.save();

                // Shadow
                if (node.shadow) {
                    ctx.shadowColor = 'rgba(0,0,0,0.2)';
                    ctx.shadowBlur = 10 / this.zoom;
                    ctx.shadowOffsetX = 2 / this.zoom;
                    ctx.shadowOffsetY = 3 / this.zoom;
                }

                // Fill
                ctx.fillStyle = node.color;
                this.drawNodeShape(ctx, x, y, w, h, node.shape, true);

                // Reset shadow for border
                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;

                // Border
                ctx.strokeStyle = isSelected ? '#fff' : (isHovered ? '#ffd54f' : node.borderColor);
                ctx.lineWidth = (isSelected ? 3.5 : (isHovered ? 3 : node.borderWidth)) / this.zoom;
                ctx.setLineDash(this.getBorderDash(node.borderStyle, ctx.lineWidth));
                this.drawNodeShape(ctx, x, y, w, h, node.shape, false);
                ctx.setLineDash([]);

                // Selection glow
                if (isSelected) {
                    ctx.strokeStyle = 'rgba(88,166,255,0.5)';
                    ctx.lineWidth = 7 / this.zoom;
                    ctx.setLineDash([]);
                    this.drawNodeShape(ctx, x, y, w + 4 / this.zoom, h + 4 / this.zoom, node.shape, false);
                }

                ctx.restore();

                // Text
                ctx.save();
                ctx.fillStyle = node.textColor;
                const fontSize = node.fontSize / this.zoom;
                ctx.font = `${node.fontWeight} ${fontSize}px "${node.fontFamily}", Cairo, sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const lines = node.text.split('\n');
                const lineHeight = fontSize * 1.4;
                const totalHeight = lines.length * lineHeight;
                const startY = y - totalHeight / 2 + lineHeight / 2;
                lines.forEach((line, i) => {
                    ctx.fillText(line, x, startY + i * lineHeight);
                });
                ctx.restore();

                // Collapse indicator
                if (node.collapsed && node.children && node.children.length > 0) {
                    ctx.save();
                    ctx.fillStyle = '#fff';
                    ctx.font = `bold ${14/this.zoom}px Cairo, sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('+' + node.children.length, x + w / 2 + 10 / this.zoom, y);
                    ctx.restore();
                }
            }

            drawNodeShape(ctx, x, y, w, h, shape, fill) {
                const hw = w / 2;
                const hh = h / 2;
                ctx.beginPath();
                switch (shape) {
                    case 'circle':
                        ctx.ellipse(x, y, hw, hh, 0, 0, Math.PI * 2);
                        break;
                    case 'diamond':
                        ctx.moveTo(x, y - hh);
                        ctx.lineTo(x + hw, y);
                        ctx.lineTo(x, y + hh);
                        ctx.lineTo(x - hw, y);
                        ctx.closePath();
                        break;
                    case 'pill':
                        const r = Math.min(hw, hh);
                        ctx.moveTo(x - hw + r, y - hh);
                        ctx.lineTo(x + hw - r, y - hh);
                        ctx.arcTo(x + hw, y - hh, x + hw, y - hh + r, r);
                        ctx.lineTo(x + hw, y + hh - r);
                        ctx.arcTo(x + hw, y + hh, x + hw - r, y + hh, r);
                        ctx.lineTo(x - hw + r, y + hh);
                        ctx.arcTo(x - hw, y + hh, x - hw, y + hh - r, r);
                        ctx.lineTo(x - hw, y - hh + r);
                        ctx.arcTo(x - hw, y - hh, x - hw + r, y - hh, r);
                        ctx.closePath();
                        break;
                    case 'rounded':
                        const cr = Math.min(hw, hh, 14);
                        ctx.moveTo(x - hw + cr, y - hh);
                        ctx.lineTo(x + hw - cr, y - hh);
                        ctx.arcTo(x + hw, y - hh, x + hw, y - hh + cr, cr);
                        ctx.lineTo(x + hw, y + hh - cr);
                        ctx.arcTo(x + hw, y + hh, x + hw - cr, y + hh, cr);
                        ctx.lineTo(x - hw + cr, y + hh);
                        ctx.arcTo(x - hw, y + hh, x - hw, y + hh - cr, cr);
                        ctx.lineTo(x - hw, y - hh + cr);
                        ctx.arcTo(x - hw, y - hh, x - hw + cr, y - hh, cr);
                        ctx.closePath();
                        break;
                    case 'rect':
                    default:
                        ctx.rect(x - hw, y - hh, w, h);
                        break;
                }
                if (fill) ctx.fill();
                else ctx.stroke();
            }

            getBorderDash(style, lineWidth) {
                const lw = Math.max(1, lineWidth);
                switch (style) {
                    case 'dashed':
                        return [8 / lw, 4 / lw];
                    case 'dotted':
                        return [2 / lw, 3 / lw];
                    case 'double':
                        return [];
                    default:
                        return [];
                }
            }

            // ---- Utilities ----
            getContrastColor(hex) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                const brightness = (r * 299 + g * 587 + b * 114) / 1000;
                return brightness > 150 ? '#1a1d23' : '#ffffff';
            }

            darkenColor(hex, amount) {
                let r = parseInt(hex.slice(1, 3), 16);
                let g = parseInt(hex.slice(3, 5), 16);
                let b = parseInt(hex.slice(5, 7), 16);
                r = Math.max(0, Math.floor(r * (1 - amount)));
                g = Math.max(0, Math.floor(g * (1 - amount)));
                b = Math.max(0, Math.floor(b * (1 - amount)));
                return '#' + [r, g, b].map(c => c.toString(16).padStart(2, '0')).join('');
            }

            showToast(msg) {
                if (this._toastTimeout) clearTimeout(this._toastTimeout);
                this.toast.textContent = msg;
                this.toast.classList.add('show');
                this._toastTimeout = setTimeout(() => {
                    this.toast.classList.remove('show');
                }, 2000);
            }

            // ---- Export ----
            exportPNG() {
                // Create a temporary canvas with all nodes visible
                const allNodes = Object.values(this.nodes);
                if (allNodes.length === 0) {
                    this.showToast('⚠️ لا توجد عقد للتصدير');
                    return;
                }
                let minX = Infinity,
                    minY = Infinity,
                    maxX = -Infinity,
                    maxY = -Infinity;
                allNodes.forEach(n => {
                    minX = Math.min(minX, n.x - n.width);
                    minY = Math.min(minY, n.y - n.height);
                    maxX = Math.max(maxX, n.x + n.width);
                    maxY = Math.max(maxY, n.y + n.height);
                });
                const padding = 60;
                const expW = maxX - minX + padding * 2;
                const expH = maxY - minY + padding * 2;
                const expZoom = Math.min(4000 / expW, 4000 / expH, 3);

                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = expW * expZoom;
                tempCanvas.height = expH * expZoom;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.fillStyle = '#f8f9fa';
                tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);

                // Save current state
                const savedOffsetX = this.offsetX;
                const savedOffsetY = this.offsetY;
                const savedZoom = this.zoom;
                const savedCanvasW = this.canvasDisplayW;
                const savedCanvasH = this.canvasDisplayH;

                // Temporarily set for export
                this.offsetX = -minX * expZoom + padding * expZoom;
                this.offsetY = -minY * expZoom + padding * expZoom;
                this.zoom = expZoom;
                this.canvasDisplayW = tempCanvas.width;
                this.canvasDisplayH = tempCanvas.height;
                this.ctx = tempCtx;

                this.render();

                // Restore
                this.offsetX = savedOffsetX;
                this.offsetY = savedOffsetY;
                this.zoom = savedZoom;
                this.canvasDisplayW = savedCanvasW;
                this.canvasDisplayH = savedCanvasH;
                this.ctx = this.canvas.getContext('2d');
                this.render();

                // Download
                const link = document.createElement('a');
                link.download = 'mind-map-' + new Date().toISOString().slice(0, 10) + '.png';
                link.href = tempCanvas.toDataURL('image/png');
                link.click();
                this.showToast('📥 تم تصدير الصورة بنجاح');
            }

            // ---- Save/Load ----
            saveToStorage() {
                const data = {
                    nodes: this.nodes,
                    rootIds: this.rootIds,
                    selectedNodeId: this.selectedNodeId,
                    offsetX: this.offsetX,
                    offsetY: this.offsetY,
                    zoom: this.zoom,
                };
                try {
                    localStorage.setItem('mindmap-data', JSON.stringify(data));
                    this.showToast('💾 تم الحفظ بنجاح');
                } catch (e) {
                    this.showToast('⚠️ فشل الحفظ - الذاكرة ممتلئة');
                }
            }

            loadFromStorage() {
                try {
                    const raw = localStorage.getItem('mindmap-data');
                    if (!raw) {
                        this.showToast('⚠️ لا توجد بيانات محفوظة');
                        return;
                    }
                    const data = JSON.parse(raw);
                    this.nodes = data.nodes || {};
                    this.rootIds = data.rootIds || [];
                    this.selectedNodeId = data.selectedNodeId || null;
                    this.offsetX = data.offsetX || this.canvasDisplayW / 2;
                    this.offsetY = data.offsetY || this.canvasDisplayH / 2;
                    this.zoom = data.zoom || 1;
                    this.history = [];
                    this.historyIndex = -1;
                    this.saveHistory();
                    this.updateZoomLabel();
                    this.render();
                    if (this.selectedNodeId && this.nodes[this.selectedNodeId]) {
                        this.showStylePanel();
                        this.updateStylePanel();
                    } else {
                        this.hideStylePanel();
                    }
                    this.showToast('📂 تم التحميل بنجاح');
                } catch (e) {
                    this.showToast('⚠️ فشل التحميل - بيانات غير صالحة');
                }
            }
        }

        // ==================== INITIALIZE ====================
        const mindMap = new MindMap();
        window.mindMap = mindMap;

        // Auto-save periodically
        setInterval(() => {
            if (Object.keys(mindMap.nodes).length > 0) {
                try {
                    const data = {
                        nodes: mindMap.nodes,
                        rootIds: mindMap.rootIds,
                        selectedNodeId: mindMap.selectedNodeId,
                        offsetX: mindMap.offsetX,
                        offsetY: mindMap.offsetY,
                        zoom: mindMap.zoom,
                    };
                    localStorage.setItem('mindmap-autosave', JSON.stringify(data));
                } catch (e) { /* silent */ }
            }
        }, 10000);

        // Load auto-save on startup if no nodes exist
        if (Object.keys(mindMap.nodes).length <= 1) {
            try {
                const raw = localStorage.getItem('mindmap-autosave');
                if (raw) {
                    const data = JSON.parse(raw);
                    if (data.nodes && Object.keys(data.nodes).length > 1) {
                        mindMap.nodes = data.nodes;
                        mindMap.rootIds = data.rootIds || [];
                        mindMap.selectedNodeId = data.selectedNodeId || null;
                        mindMap.offsetX = data.offsetX || mindMap.canvasDisplayW / 2;
                        mindMap.offsetY = data.offsetY || mindMap.canvasDisplayH / 2;
                        mindMap.zoom = data.zoom || 1;
                        mindMap.history = [];
                        mindMap.historyIndex = -1;
                        mindMap.saveHistory();
                        mindMap.updateZoomLabel();
                        mindMap.render();
                        if (mindMap.selectedNodeId && mindMap.nodes[mindMap.selectedNodeId]) {
                            mindMap.showStylePanel();
                            mindMap.updateStylePanel();
                        }
                    }
                }
            } catch (e) { /* silent */ }
        }

        console.log('🧠✨ أداة الخرائط الذهنية جاهزة!');
        console.log('   🖱️ انقر مرتين لإنشاء عقدة | اسحب للتحريك | عجلة الفأرة للتكبير');
        console.log('   ⌨️ Tab = فرع | Enter = شقيقة | Delete = حذف | Ctrl+Z = تراجع');
        console.log('   💾 الحفظ التلقائي مفعّل كل 10 ثوانٍ');
    </script>
</body>
</html>
