<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>خريطة ذهنية متكاملة | مساحة لا نهائية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Amiri:wght@400;700&family=Reem+Kufi:wght@400;600&family=El+Messiri:wght@400;600&family=Almarai:wght@400;700&family=Changa:wght@400;600;700&family=Rubik:wght@400;500;700&family=Open+Sans:wght@400;600;700&family=Roboto:wght@400;500;700&family=Poppins:wght@400;600;700&family=Playfair+Display:wght@400;700&family=Monospace&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { --bg:#1e1e2e; --panel-bg:#252536; --text:#e0e0e0; --accent:#7c8aff; --border:#3a3a50; --hover:#2e2e42; --shadow:0 12px 32px rgba(0,0,0,0.5); }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Cairo',sans-serif; background:var(--bg); overflow:hidden; height:100vh; width:100vw; user-select:none; -webkit-user-select:none; touch-action:none; }
        #welcome-screen { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(20,20,30,0.9); backdrop-filter:blur(20px); z-index:500; display:flex; align-items:center; justify-content:center; transition:opacity 0.5s; }
        #welcome-screen.hidden { opacity:0; visibility:hidden; pointer-events:none; }
        .welcome-card { background:var(--panel-bg); border:1px solid var(--border); border-radius:32px; padding:40px; max-width:600px; width:90%; text-align:center; box-shadow:0 20px 50px rgba(0,0,0,0.6); }
        .welcome-card h1 { font-size:2.2rem; color:#fff; margin-bottom:12px; }
        .welcome-actions { display:flex; gap:16px; justify-content:center; flex-wrap:wrap; margin-top:20px; }
        .welcome-btn { padding:14px 28px; border-radius:50px; border:none; font-family:inherit; font-size:1rem; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:8px; background:var(--accent); color:#fff; }
        .welcome-btn.secondary { background:var(--hover); color:var(--text); border:1px solid var(--border); }
        #toolbar { position:fixed; top:16px; left:50%; transform:translateX(-50%); z-index:100; background:var(--panel-bg); border:1px solid var(--border); border-radius:50px; padding:6px 10px; box-shadow:var(--shadow); backdrop-filter:blur(20px); display:flex; align-items:center; gap:2px; flex-wrap:wrap; justify-content:center; transition:all 0.3s; max-width:95vw; }
        #toolbar.compact button span.text-label { display:none; }
        #toolbar.compact button { padding:9px 11px; }
        #toolbar button { background:transparent; border:none; color:var(--text); cursor:pointer; padding:9px 13px; border-radius:25px; font-size:13px; font-family:inherit; display:flex; align-items:center; gap:5px; font-weight:500; transition:0.2s; white-space:nowrap; }
        #toolbar button:hover { background:var(--hover); color:#fff; }
        #toolbar button.active-mode { background:var(--accent); color:#fff; }
        .divider { width:1px; height:24px; background:var(--border); margin:0 4px; }
        .zoom-label { color:#a0a0b0; font-size:12px; padding:0 8px; font-weight:600; }
        #canvas-container { position:fixed; top:0; left:0; width:100%; height:100%; cursor:grab; }
        canvas { display:block; position:absolute; top:0; left:0; }
        #style-panel { position:fixed; right:12px; top:50%; transform:translateY(-50%); z-index:99; background:var(--panel-bg); border:1px solid var(--border); border-radius:16px; padding:18px; box-shadow:var(--shadow); width:270px; max-height:75vh; overflow-y:auto; opacity:0; pointer-events:none; transition:0.2s; backdrop-filter:blur(20px); }
        #style-panel.visible { opacity:1; pointer-events:all; }
        #style-panel h3 { color:var(--text); margin-bottom:12px; text-align:center; }
        #style-panel .section { margin-bottom:16px; }
        .section-label { color:#a0a0b0; font-size:11px; text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
        .color-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
        .color-swatch { width:30px; height:30px; border-radius:50%; cursor:pointer; border:2px solid transparent; }
        .color-swatch:hover { transform:scale(1.2); border-color:#fff; }
        #custom-color, #pen-color-input { width:100%; height:38px; border:1px solid var(--border); border-radius:8px; background:var(--bg); padding:3px; }
        #font-select, #font-size-slider, #pen-size-slider { width:100%; padding:8px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-family:inherit; }
        .btn-row { display:flex; gap:6px; }
        .btn-row button { flex:1; padding:10px; border-radius:8px; border:1px solid var(--border); cursor:pointer; font-family:inherit; background:var(--bg); color:var(--text); }
        .btn-row button.danger { border-color:#f8514960; color:#f85149; }
        .btn-row button.primary { background:var(--accent); color:#fff; }
        #node-text-input { position:fixed; z-index:150; border:2px solid var(--accent); border-radius:12px; padding:8px; font-family:inherit; font-size:16px; outline:none; text-align:center; background:#fff; color:#1a1a2e; min-width:140px; box-shadow:0 8px 25px rgba(0,0,0,0.6); display:none; direction:rtl; }
        #toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:300; background:#2ea043; color:#fff; padding:12px 24px; border-radius:30px; font-weight:700; opacity:0; transition:0.3s; pointer-events:none; }
        #toast.show { opacity:1; }
    </style>
</head>
<body>
<div id="welcome-screen">
    <div class="welcome-card">
        <h1>🧠 خريطة الأفكار المتكاملة</h1>
        <p style="color:#a0a0b0;">✏️ رسم حر | 🔗 توصيل | 📝 أوراق لاصقة | 📌 دبابيس | تحجيم | حفظ تلقائي</p>
        <div class="welcome-actions">
            <button class="welcome-btn" onclick="mindMap.startNewMap()"><i class="fas fa-plus-circle"></i> ابدأ جديدة</button>
            <button class="welcome-btn secondary" onclick="mindMap.loadLastSession()"><i class="fas fa-history"></i> استئناف الجلسة</button>
        </div>
    </div>
</div>

<div id="toolbar">
    <button onclick="mindMap.addNode('node')"><i class="fas fa-circle-plus"></i> <span class="text-label">عقدة</span></button>
    <button onclick="mindMap.addNode('sticky')" style="color:#ffd43b;"><i class="fas fa-sticky-note"></i> <span class="text-label">ورقة</span></button>
    <button onclick="mindMap.addNode('pin')" style="color:#ff6b6b;"><i class="fas fa-thumbtack"></i> <span class="text-label">دبوس</span></button>
    <span class="divider"></span>
    <button onclick="mindMap.addChildToSelected()"><i class="fas fa-code-branch"></i> <span class="text-label">فرع</span></button>
    <button onclick="mindMap.addSiblingToSelected()"><i class="fas fa-arrows-left-right"></i> <span class="text-label">شقيقة</span></button>
    <span class="divider"></span>
    <button id="connect-mode-btn" onclick="mindMap.toggleConnectMode()"><i class="fas fa-link"></i> <span class="text-label">توصيل</span></button>
    <button id="draw-mode-btn" onclick="mindMap.toggleDrawMode()"><i class="fas fa-pencil-alt"></i> <span class="text-label">رسم</span></button>
    <span class="divider"></span>
    <button onclick="mindMap.undo()"><i class="fas fa-undo"></i></button>
    <button onclick="mindMap.redo()"><i class="fas fa-redo"></i></button>
    <span class="divider"></span>
    <button onclick="mindMap.autoArrange()"><i class="fas fa-magic"></i> <span class="text-label">تنسيق</span></button>
    <button onclick="mindMap.zoomIn()"><i class="fas fa-search-plus"></i></button>
    <span class="zoom-label" id="zoom-label">100%</span>
    <button onclick="mindMap.zoomOut()"><i class="fas fa-search-minus"></i></button>
    <button onclick="mindMap.resetView()"><i class="fas fa-home"></i></button>
    <span class="divider"></span>
    <button onclick="mindMap.exportPNG()"><i class="fas fa-download"></i></button>
    <button onclick="mindMap.clearAll()" style="color:#f85149;"><i class="fas fa-trash-alt"></i></button>
    <button id="toggle-toolbar-btn" onclick="mindMap.toggleToolbar()" style="color:#aaa;"><i class="fas fa-compress"></i></button>
</div>

<div id="canvas-container"><canvas id="main-canvas"></canvas></div>

<div id="style-panel">
    <h3 id="style-panel-title">🎨 تخصيص</h3>
    <div class="section" id="style-color-section"><div class="section-label">🎯 اللون</div><div class="color-grid" id="color-grid"></div><input type="color" id="custom-color" value="#7c8aff" style="margin-top:8px;"></div>
    <div class="section" id="style-font-section"><div class="section-label">🔤 الخط</div><select id="font-select"></select></div>
    <div class="section" id="style-size-section"><div class="section-label">📏 حجم الخط</div><input type="range" id="font-size-slider" min="10" max="48" value="18" step="1"><span id="font-size-val" style="color:#a0a0b0;">18px</span></div>
    <div class="section" id="pen-settings" style="display:none;"><div class="section-label">🖊️ لون القلم</div><input type="color" id="pen-color-input" value="#ff7b9c"><div class="section-label" style="margin-top:8px;">📏 حجم القلم</div><input type="range" id="pen-size-slider" min="1" max="12" value="3" step="0.5"><span id="pen-size-val" style="color:#a0a0b0;">3</span></div>
    <div class="btn-row"><button class="danger" onclick="mindMap.deleteSelected()"><i class="fas fa-trash"></i> حذف</button><button class="primary" onclick="mindMap.addChildToSelected()"><i class="fas fa-plus"></i> فرع</button></div>
    <button onclick="mindMap.clearDrawings()" style="width:100%;margin-top:8px;padding:8px;border-radius:8px;border:1px solid #f8514960;background:transparent;color:#f85149;cursor:pointer;font-family:inherit;font-size:13px;"><i class="fas fa-eraser"></i> مسح كل الرسومات</button>
</div>

<input type="text" id="node-text-input" dir="rtl" placeholder="أدخل النص...">
<div id="toast"></div>

<script>
(function() {
class MindMap {
    constructor() {
        this.nodes = {}; this.rootIds = []; this.selectedNodeId = null;
        this.links = []; this.drawings = []; this.currentDrawing = null;
        this.drawMode = false; this.connectMode = false; this.connectFirstNode = null;
        this.offsetX = 0; this.offsetY = 0; this.zoom = 1;
        this.isPanning = false; this.isDraggingNode = false; this.isResizing = false;
        this.resizeNodeId = null; this.resizeStartSize = null;
        this._mouseMoved = false; this._drawingActive = false;
        this.history = []; this.historyIndex = -1; this._editingNodeId = null;
        this.toolbarCompact = false; this.penColor = '#ff7b9c'; this.penSize = 3;
        this.canvas = document.getElementById('main-canvas'); this.ctx = this.canvas.getContext('2d');
        this.container = document.getElementById('canvas-container');
        this.stylePanel = document.getElementById('style-panel'); this.styleTitle = document.getElementById('style-panel-title');
        this.textInput = document.getElementById('node-text-input'); this.toast = document.getElementById('toast');
        this.zoomLabel = document.getElementById('zoom-label'); this.welcomeScreen = document.getElementById('welcome-screen');
        this.connectModeBtn = document.getElementById('connect-mode-btn'); this.drawModeBtn = document.getElementById('draw-mode-btn');
        this.colorPalette = ['#7c8aff','#5C6BC0','#7E57C2','#AB47BC','#EC407A','#EF5350','#FF7043','#FFA726','#FFCA28','#FFEE58','#9CCC65','#66BB6A','#26A69A','#26C6DA','#29B6F6','#42A5F5','#78909C','#8D6E63','#F06292','#BA68C8','#64B5F6','#4DB6AC','#FFB74D','#E57373'];
        this.availableFonts = ['Cairo','Amiri','Reem Kufi','El Messiri','Almarai','Changa','Rubik','Open Sans','Roboto','Poppins','Playfair Display','Arial','Tahoma','Trebuchet MS','Courier New','Georgia','Verdana','Impact','monospace'];
        this.init();
    }
    init() {
        this.resizeCanvas(); this.setupListeners(); this.buildUI(); this.loadLastSession(true);
        if (Object.keys(this.nodes).length === 0) {
            const mainId = this.createItem('node','الفكرة الرئيسية',0,0,'#7c8aff','rounded','Cairo',20);
            this.rootIds=[mainId]; this.selectedNodeId=mainId;
        }
        this.saveHistory(); this.render(); this.updateZoomLabel(); this.centerView(); this.welcomeScreen.classList.remove('hidden');
    }
    startNewMap() { this.nodes={};this.rootIds=[];this.links=[];this.drawings=[];this.selectedNodeId=null;this.history=[];this.historyIndex=-1;this.welcomeScreen.classList.add('hidden');const id=this.createItem('node','فكرة جديدة',0,0,'#7c8aff','rounded','Cairo',20);this.rootIds=[id];this.selectedNodeId=id;this.saveHistory();this.render();this.showStylePanel();this.centerView();this.autoSave(); }
    loadLastSession(silent=false) { const raw=localStorage.getItem('mindmap-pro-autosave'); if(raw) { try { const data=JSON.parse(raw); this.nodes=data.nodes||{};this.rootIds=data.rootIds||[];this.links=data.links||[];this.drawings=data.drawings||[];this.selectedNodeId=data.selectedNodeId||null;this.offsetX=data.offsetX||0;this.offsetY=data.offsetY||0;this.zoom=data.zoom||1;this.history=[];this.historyIndex=-1;this.saveHistory();this.updateZoomLabel();this.render();if(this.selectedNodeId&&this.nodes[this.selectedNodeId])this.showStylePanel();if(!silent)this.showToast('📂 تم استئناف الجلسة');return true; } catch(e){} } return false; }
    autoSave() { try { localStorage.setItem('mindmap-pro-autosave',JSON.stringify({nodes:this.nodes,rootIds:this.rootIds,links:this.links,drawings:this.drawings,selectedNodeId:this.selectedNodeId,offsetX:this.offsetX,offsetY:this.offsetY,zoom:this.zoom})); } catch(e){} }
    resizeCanvas() { const dpr=window.devicePixelRatio||1; this.canvas.width=window.innerWidth*dpr; this.canvas.height=window.innerHeight*dpr; this.canvas.style.width=window.innerWidth+'px'; this.canvas.style.height=window.innerHeight+'px'; this.ctx.setTransform(1,0,0,1,0,0); this.ctx.scale(dpr,dpr); this.canvasDisplayW=window.innerWidth; this.canvasDisplayH=window.innerHeight; }
    setupListeners() {
        window.addEventListener('resize',()=>{this.resizeCanvas();this.render();});
        this.canvas.addEventListener('mousedown',e=>this.onMouseDown(e));
        window.addEventListener('mousemove',e=>this.onMouseMove(e));
        window.addEventListener('mouseup',e=>this.onMouseUp(e));
        this.canvas.addEventListener('wheel',e=>this.onWheel(e),{passive:false});
        this.canvas.addEventListener('dblclick',e=>this.onDoubleClick(e));
        this.canvas.addEventListener('touchstart',e=>this.onTouchStart(e),{passive:false});
        this.canvas.addEventListener('touchmove',e=>this.onTouchMove(e),{passive:false});
        this.canvas.addEventListener('touchend',e=>this.onTouchEnd(e));
        window.addEventListener('keydown',e=>this.onKeyDown(e));
        document.getElementById('custom-color').addEventListener('input',e=>this.applyStyle('color',e.target.value));
        document.getElementById('custom-color').addEventListener('change',()=>{this.saveHistory();this.autoSave();});
        document.getElementById('font-select').addEventListener('change',e=>{this.applyStyle('fontFamily',e.target.value);this.autoSave();});
        document.getElementById('font-size-slider').addEventListener('input',e=>{document.getElementById('font-size-val').textContent=e.target.value+'px';this.applyStyle('fontSize',parseInt(e.target.value));});
        document.getElementById('font-size-slider').addEventListener('change',()=>{this.saveHistory();this.autoSave();});
        document.getElementById('pen-color-input').addEventListener('input',e=>this.penColor=e.target.value);
        document.getElementById('pen-size-slider').addEventListener('input',e=>{this.penSize=parseFloat(e.target.value);document.getElementById('pen-size-val').textContent=e.target.value;});
        this.setupTextInput();
    }
    buildUI() { const grid=document.getElementById('color-grid');grid.innerHTML='';this.colorPalette.forEach(c=>{const s=document.createElement('div');s.className='color-swatch';s.style.backgroundColor=c;s.addEventListener('click',()=>this.applyStyle('color',c));grid.appendChild(s);});const sel=document.getElementById('font-select');sel.innerHTML='';this.availableFonts.forEach(f=>{const o=document.createElement('option');o.value=f;o.textContent=f;sel.appendChild(o);}); }
    createItem(type,text,x,y,color,shape,fontFamily,fontSize) { const id=type+'_'+Date.now()+'_'+Math.random().toString(36).substr(2,6); const node={id,type,text:text||(type==='pin'?'📍':(type==='sticky'?'ملاحظة':'عقدة')),x,y,color:color||(type==='sticky'?'#ffec99':(type==='pin'?'#ff6b6b':'#7c8aff')),width:type==='pin'?30:140,height:type==='pin'?30:50,fontSize:fontSize||(type==='pin'?14:18),fontFamily:fontFamily||'Cairo',shape:shape||'rounded',borderWidth:2,shadow:true,children:[],parent:null,collapsed:false}; if(type==='pin'){node.shape='circle';node.width=30;node.height=30;} if(type==='sticky'){node.shape='rect';node.width=180;node.height=130;node.color=color||'#ffec99';node.textColor='#333';} node.textColor=node.textColor||this.getContrastColor(node.color); node.borderColor=this.darkenColor(node.color,0.3); this.nodes[id]=node; return id; }
    addNode(type) { const cw=this.screenToWorld(this.canvasDisplayW/2,this.canvasDisplayH/2); const color=type==='sticky'?'#ffec99':(type==='pin'?'#ff6b6b':this.colorPalette[Math.floor(Math.random()*this.colorPalette.length)]); const id=this.createItem(type,null,cw.x,cw.y,color); if(type==='node')this.rootIds.push(id); this.selectedNodeId=id;this.saveHistory();this.render();this.showStylePanel();this.welcomeScreen.classList.add('hidden');this.autoSave(); }
    addChildToSelected() { if(!this.selectedNodeId||!this.nodes[this.selectedNodeId])return; const p=this.nodes[this.selectedNodeId]; if(p.type!=='node'){this.showToast('⚠️ الفروع للعقد فقط');return;} const angle=(p.children.length*0.7)+(Math.random()-0.5)*0.4; const dist=200+Math.random()*60; const cid=this.createItem('node','فرع',p.x+Math.cos(angle)*dist,p.y+Math.sin(angle)*dist,this.colorPalette[Math.floor(Math.random()*this.colorPalette.length)]); this.nodes[cid].parent=this.selectedNodeId; p.children.push(cid); this.selectedNodeId=cid;this.saveHistory();this.render();this.showStylePanel();this.autoSave(); }
    addSiblingToSelected() { if(!this.selectedNodeId)return; const node=this.nodes[this.selectedNodeId]; if(node.type!=='node'){this.showToast('⚠️ الأشقاء للعقد فقط');return;} if(!node.parent||!this.nodes[node.parent]){const id=this.createItem('node','شقيقة',node.x+220,node.y+100,this.colorPalette[Math.floor(Math.random()*this.colorPalette.length)]);this.rootIds.push(id);this.selectedNodeId=id;}else{const p=this.nodes[node.parent];const angle=Math.atan2(node.y-p.y,node.x-p.x)+0.8;const dist=Math.hypot(node.x-p.x,node.y-p.y);const id=this.createItem('node','شقيقة',p.x+Math.cos(angle)*dist,p.y+Math.sin(angle)*dist,node.color);this.nodes[id].parent=node.parent;p.children.push(id);this.selectedNodeId=id;} this.saveHistory();this.render();this.showStylePanel();this.autoSave(); }
    toggleConnectMode() { this.connectMode=!this.connectMode; this.drawMode=false;this.drawModeBtn.classList.remove('active-mode'); this.connectFirstNode=null; this.connectModeBtn.classList.toggle('active-mode',this.connectMode); this.updatePenSettingsVisibility(); this.container.style.cursor=this.connectMode?'crosshair':'grab'; this.showToast(this.connectMode?'🔗 وضع التوصيل: انقر على العنصر الأول ثم الثاني':'تم إلغاء وضع التوصيل'); this.render(); }
    toggleDrawMode() { this.drawMode=!this.drawMode; this.connectMode=false;this.connectModeBtn.classList.remove('active-mode'); this.drawModeBtn.classList.toggle('active-mode',this.drawMode); this.updatePenSettingsVisibility(); this.container.style.cursor=this.drawMode?'crosshair':'grab'; this.showToast(this.drawMode?'✏️ وضع الرسم: اسحب للرسم على المساحة':'تم إيقاف وضع الرسم'); }
    clearDrawings() { this.drawings=[]; this.saveHistory();this.render();this.autoSave(); this.showToast('🗑️ تم مسح كل الرسومات'); }
    updatePenSettingsVisibility() { document.getElementById('pen-settings').style.display=this.drawMode?'block':'none'; document.getElementById('style-color-section').style.display=this.drawMode?'none':'block'; document.getElementById('style-font-section').style.display=this.drawMode?'none':'block'; document.getElementById('style-size-section').style.display=this.drawMode?'none':'block'; if(this.drawMode)this.styleTitle.textContent='🖊️ إعدادات القلم'; }
    deleteSelected() { if(!this.selectedNodeId)return; this.deleteNode(this.selectedNodeId); this.selectedNodeId=null;this.hideStylePanel();this.saveHistory();this.render();this.autoSave(); }
    deleteNode(id) { const node=this.nodes[id];if(!node)return; if(node.children)[...node.children].forEach(c=>this.deleteNode(c)); if(node.parent&&this.nodes[node.parent]){this.nodes[node.parent].children=this.nodes[node.parent].children.filter(c=>c!==id);} this.rootIds=this.rootIds.filter(r=>r!==id); this.links=this.links.filter(l=>l.sourceId!==id&&l.targetId!==id); delete this.nodes[id]; }
    clearAll() { if(confirm('مسح الجميع؟')){this.nodes={};this.rootIds=[];this.links=[];this.drawings=[];this.selectedNodeId=null;this.history=[];this.historyIndex=-1;this.hideStylePanel();this.saveHistory();this.render();this.autoSave();} }
    saveHistory() { const snap={nodes:JSON.parse(JSON.stringify(this.nodes)),rootIds:[...this.rootIds],links:[...this.links],drawings:JSON.parse(JSON.stringify(this.drawings)),selectedNodeId:this.selectedNodeId}; if(this.historyIndex<this.history.length-1)this.history=this.history.slice(0,this.historyIndex+1); this.history.push(snap); if(this.history.length>80)this.history.shift(); else this.historyIndex=this.history.length-1; }
    undo() { if(this.historyIndex<=0)return; this.historyIndex--;this.restoreSnapshot(this.history[this.historyIndex]);this.render();this.autoSave(); }
    redo() { if(this.historyIndex>=this.history.length-1)return; this.historyIndex++;this.restoreSnapshot(this.history[this.historyIndex]);this.render();this.autoSave(); }
    restoreSnapshot(s) { this.nodes=JSON.parse(JSON.stringify(s.nodes));this.rootIds=[...s.rootIds];this.links=[...s.links];this.drawings=JSON.parse(JSON.stringify(s.drawings||[]));this.selectedNodeId=s.selectedNodeId; }
